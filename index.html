<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Klusjes">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
<title>Klusjesschema</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--text:#1C1C1E;
  --text2:#6C6C70;--text3:#AEAEB2;
  --border:rgba(0,0,0,0.12);--track:#E5E5EA;
  --lies:#B5006E;--lies-bg:#F9D0E8;
  --lenn:#185FA5;--lenn-bg:#E6F1FB;
  --vac:#946200;--vac-bg:#FBEFD2;
  --green:#1D9E75;--blue:#378ADD;--red:#D5493A;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E;--card:#2C2C2E;--text:#FFFFFF;
    --text2:#AEAEB2;--text3:#636366;
    --border:rgba(255,255,255,0.14);--track:#3A3A3C;
    --lies-bg:#4A0E2A;--lenn-bg:#0D2B45;--vac-bg:#3D2E08;
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
#app{max-width:420px;margin:0 auto;padding:0 14px 40px;}
button{font-family:inherit;font-size:inherit;-webkit-tap-highlight-color:transparent;border:none;background:none;cursor:pointer;}

.today-row{display:flex;justify-content:center;margin-bottom:10px;}
.today-btn{font-size:13px;font-weight:600;color:var(--blue);background:var(--card);padding:6px 16px;border-radius:10px;}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.nav button{width:38px;height:38px;border-radius:50%;background:var(--card);font-size:18px;display:flex;align-items:center;justify-content:center;}
.nav .date{text-align:center;flex:1;}
.nav .weekday{font-size:13px;color:var(--text2);text-transform:capitalize;}
.nav .fulldate{font-size:17px;font-weight:600;}

.progress-wrap{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px;}
.progress-track{height:8px;border-radius:4px;background:var(--track);overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s ease;}

.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dot{width:10px;height:10px;border-radius:50%;}
.name{font-size:16px;font-weight:700;}
.role-badge{margin-left:auto;font-size:12px;font-weight:600;padding:3px 9px;border-radius:8px;}

.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.task:last-child{border-bottom:none;}
.check{width:24px;height:24px;border-radius:7px;border:2px solid var(--track);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:white;transition:all .15s ease;}
.check.done{background:var(--green);border-color:var(--green);}
.task-label{font-size:15px;flex:1;}
.task-label.done{color:var(--text3);text-decoration:line-through;}
.fixed-mark{font-size:12px;opacity:.55;flex-shrink:0;margin-left:2px;}
.vac-tag{font-size:11px;font-weight:600;color:var(--vac);background:var(--vac-bg);padding:2px 7px;border-radius:6px;margin-left:6px;}
.postpone-btn{font-size:15px;padding:2px 4px;flex-shrink:0;color:var(--blue);}
.postpone-btn svg{display:block;}

.celebration{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.celebration-card{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;}
.celebration-emoji{font-size:56px;margin-bottom:12px;}
.celebration-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.celebration-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
.celebration-close{background:var(--green);color:white;font-weight:600;padding:11px 28px;border-radius:12px;font-size:15px;}
.pw-input{width:100%;font-size:16px;padding:11px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin:6px 0 4px;text-align:center;}
.pw-error{font-size:12px;color:var(--red);min-height:16px;margin-bottom:12px;}
.pw-actions{display:flex;gap:10px;}
.pw-actions button{flex:1;font-weight:600;padding:11px 0;border-radius:12px;font-size:15px;}
.pw-cancel{background:var(--track);color:var(--text);}
.pw-ok{background:var(--green);color:#fff;}

.footer-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:20px;}
.admin-link{font-size:13px;font-weight:600;color:var(--text2);background:var(--card);padding:8px 16px;border-radius:10px;}
.version{text-align:center;font-size:11px;color:var(--text3);}

.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px;}

.admin-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.admin-back{font-size:14px;font-weight:600;color:var(--blue);background:var(--card);padding:8px 14px;border-radius:10px;}
.admin-title{font-size:18px;font-weight:700;flex:1;}
.admin-section{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;}
.admin-role-title{font-size:15px;font-weight:700;margin-bottom:10px;}
.admin-task-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);}
.admin-task-row:last-of-type{border-bottom:none;}
.admin-task-top{display:flex;align-items:center;gap:8px;}
.admin-task-label{flex:1;font-size:14px;}
.admin-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--track);color:var(--text2);}
.admin-icon-btn{font-size:16px;padding:4px 6px;}
.admin-icon-btn svg{display:block;}
.admin-icon-btn.danger{color:var(--red);vertical-align:middle;}
.admin-icon-btn.accent{color:var(--blue);}
.admin-add-btn{margin-top:8px;font-size:14px;font-weight:600;color:var(--blue);}
.admin-weekday-row{display:flex;gap:4px;}
.admin-day-btn{flex:1;height:30px;border-radius:7px;font-size:11px;font-weight:600;text-transform:capitalize;background:var(--track);color:var(--text2);display:flex;align-items:center;justify-content:center;}
.admin-day-btn.active{background:var(--green);color:#fff;}
.admin-never{font-size:11px;color:var(--red);}
.admin-vacuum-note{font-size:12px;color:var(--text2);margin-top:6px;}
.admin-next-row{display:flex;align-items:center;gap:6px;font-size:14px;padding:10px 0 6px;border-bottom:1px solid var(--border);}
.admin-next-row span{flex:1;}
.admin-next-row small{color:var(--text2);}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqJMQobVVPy1Cx-rq-JAKZP2r9jFrzddI",
  authDomain: "klusjes-9b7b8.firebaseapp.com",
  databaseURL: "https://klusjes-9b7b8-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "klusjes-9b7b8",
  storageBucket: "klusjes-9b7b8.firebasestorage.app",
  messagingSenderId: "839893725363",
  appId: "1:839893725363:web:a4ff615a8b832ac08c40c6"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

const ADMIN_PASSWORD = 'Klusjes.01';

const START = new Date(2026, 5, 26); // 26 juni 2026
const TOTAL_DAYS = 67; // t.e.m. 31 augustus 2026
const VERSION = 'klusjes-pwa v10';
const WD = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MN = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const FLOORS = ['gelijkvloers','Verdiep ouders','Verdiep kinderen']; // fallback zolang settings/vacuum/floors ontbreekt
const KID_NAMES = { lies:'Lies', lenn:'Lenn' };
// lijntekeningen i.p.v. emoji's (🗑 ⏭ ⏮): kleur-emoji's negeren CSS `color` en de
// zwarte ⏭/⏮-glyfen verdwijnen op een donkere achtergrond — deze SVG's volgen currentColor
const TRASH_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M18 7l-1 13a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 7"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
const SKIP_FWD_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>';
const SKIP_BACK_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 4 9 12 19 20 19 4"/><line x1="5" y1="5" x2="5" y2="19"/></svg>';

const DEFAULT_TASKS = {
  A: {
    a1: { label:'Tafel afruimen', recurring:true, order:0 },
    a2: { label:'Vaatwas legen', recurring:true, order:1 }
  },
  B: {
    b1: { label:'Tafel afkuisen', recurring:true, order:0 },
    b2: { label:'Vaatwas vullen & starten', recurring:true, order:1 }
  }
};

const ALL_WEEKDAYS = [0,1,2,3,4,5,6];
const DEFAULT_VACUUM = { weekdays: [1,5] }; // huidige planning: maandag & vrijdag

let current = new Date();
if (current < START) current = new Date(START);

let screen = 'day'; // 'day' | 'admin'
let adminUnlocked = false;

let tasksCache = { A:{}, B:{}, lies:{}, lenn:{} };
let tasksLoaded = false;

let vacuumCache = { weekdays: DEFAULT_VACUUM.weekdays, floors: null, next: null, override: null, lastDone: null };
let vacuumLoaded = false;

let dayState = {};
let dayLoaded = false;
let dayUnsubscribe = null;
let dayListenerToken = 0;

let celebratedDays = new Set();
let loadError = null;

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function dayIndex(d){
  const clean = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((clean - START) / 86400000);
}

function getRoles(idx){
  // wisselt elke dag: even index -> Lies=A, oneven -> Lies=B
  return idx % 2 === 0
    ? { lies:'A', lenn:'B' }
    : { lies:'B', lenn:'A' };
}

function vacuumWeekdays(){
  return Array.isArray(vacuumCache.weekdays) ? vacuumCache.weekdays : DEFAULT_VACUUM.weekdays;
}

function vacuumFloors(){
  const f = vacuumCache.floors;
  return (Array.isArray(f) && f.length > 0) ? f : FLOORS;
}

// Legacy-formule: kalendergebaseerde rotatie van vóór het pointer-systeem.
// Alleen nog gebruikt als fallback (historiek en databases zonder `next`).
function getVacuum(idx, d, vacDays){
  const days = vacDays || vacuumWeekdays();
  const dow = d.getDay();
  if (!days.includes(dow)) return null;
  // telt hoeveel geconfigureerde stofzuigdagen er al geweest zijn t.e.m. deze dag
  let count = 0;
  for (let i = 0; i <= idx; i++){
    const dd = new Date(START); dd.setDate(dd.getDate() + i);
    if (days.includes(dd.getDay())) count++;
  }
  const vacIdx = count - 1;
  return {
    kid: vacIdx % 2 === 0 ? 'lies' : 'lenn',
    floorIdx: vacIdx % vacuumFloors().length
  };
}

function parseDayKey(key){
  const [y, m, d] = String(key).split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}

function clampedToday(){
  const t = new Date();
  return t < START ? new Date(START) : t;
}

function nextScheduledDayFrom(d){
  const days = vacuumWeekdays();
  if (!days.length) return null;
  for (let i = Math.max(0, dayIndex(d)); i < TOTAL_DAYS; i++){
    const dd = new Date(START); dd.setDate(dd.getDate() + i);
    if (days.includes(dd.getDay())) return dd;
  }
  return null;
}

// De dag waarop de openstaande beurt staat: de override-dag als die vandaag of
// later valt, anders de eerstvolgende geplande stofzuigdag vanaf vandaag.
// Een gemiste beurt schuift zo vanzelf door — zelfde kind, zelfde verdieping.
function pendingVacuumDay(){
  let from = clampedToday();
  const ld = vacuumCache.lastDone ? parseDayKey(vacuumCache.lastDone) : null;
  if (ld && dayIndex(ld) >= dayIndex(from)){
    // de beurt van vandaag (of vooruitgewerkt: later) is al gedaan — de
    // volgende beurt begint pas op de eerste geplande dag daarna
    from = new Date(ld.getFullYear(), ld.getMonth(), ld.getDate() + 1);
  }
  if (dayIndex(from) >= TOTAL_DAYS) return null;
  const ov = vacuumCache.override;
  if (ov){
    const od = parseDayKey(ov);
    if (od && dayIndex(od) < TOTAL_DAYS){
      // Een override in het verleden (een verplaatste/naar-vandaag-gehaalde beurt
      // die is blijven liggen) niet weggooien maar mee-schuiven naar vandaag, zodat
      // de beurt zichtbaar en aanklikbaar blijft i.p.v. door te springen naar de
      // eerstvolgende geplande dag en te lijken verdwijnen.
      return dayIndex(od) >= dayIndex(from) ? dayKey(od) : dayKey(from);
    }
  }
  const nd = nextScheduledDayFrom(from);
  return nd ? dayKey(nd) : null;
}

// De openstaande beurt: de pointer uit de database, of (zolang die er nog niet
// is) de legacy-formule toegepast op de pending-dag — naadloze overname.
function effectiveNext(){
  const floors = vacuumFloors();
  const n = vacuumCache.next;
  if (n && (n.kid === 'lies' || n.kid === 'lenn') && Number.isInteger(n.floorIdx)){
    return { kid: n.kid, floorIdx: ((n.floorIdx % floors.length) + floors.length) % floors.length };
  }
  const nd = nextScheduledDayFrom(clampedToday());
  return nd ? getVacuum(dayIndex(nd), nd) : null;
}

function advanceCombo(c, steps){
  const len = vacuumFloors().length;
  const flip = steps % 2 !== 0;
  return {
    kid: flip ? (c.kid === 'lies' ? 'lenn' : 'lies') : c.kid,
    floorIdx: ((c.floorIdx + steps) % len + len) % len
  };
}

// Bepaalt wat de stofzuigrij voor een dag toont:
//  'done'      – snapshot uit days/{key}/vac (bevroren historiek)
//  'pending'   – de ene openstaande beurt (interactief, met doorschuifknop)
//  'legacy'    – historiek via de oude formule, van vóór het pointer-systeem
//  'projected' – vooruitblik alsof elke beurt gedaan wordt, niet interactief
function vacuumForDay(d){
  const floors = vacuumFloors();
  const snap = dayState && dayState.vac;
  if (snap && snap.kid){
    // floorIdx terugzoeken uit het label zodat een onaangevinkte snapshot-rij
    // (bv. door de beheerder klaargezet) ook de 📥-knop kan tonen; na een
    // hernoemde verdieping levert dit null op en verschijnen er geen knoppen
    const fi = floors.indexOf(snap.floor);
    return { kid: snap.kid, floor: snap.floor, floorIdx: fi >= 0 ? fi : null, mode: 'done' };
  }

  const key = dayKey(d);
  const pKey = pendingVacuumDay();
  if (pKey && key === pKey){
    const n = effectiveNext();
    return n ? { kid: n.kid, floorIdx: n.floorIdx, floor: floors[n.floorIdx], mode: 'pending' } : null;
  }

  const idx = dayIndex(d);
  if (idx < dayIndex(clampedToday())){
    // Verleden zonder snapshot: vóór het pointer-systeem toont de formule de
    // historiek. Mét pointer is een niet-gedane beurt doorgeschoven en toont de
    // dag niets — tenzij deze dag ooit een vinkje had (`!== undefined`, niet
    // waarheids-check: uitvinken schrijft `false` weg, geen verwijdering — een
    // truthy-check zou de taak dan laten verdwijnen in plaats van onaangevinkt
    // te blijven staan).
    if (!vacuumCache.next || dayState['lies-vac'] !== undefined || dayState['lenn-vac'] !== undefined){
      const lv = getVacuum(idx, d, vacuumWeekdays());
      if (lv) return { kid: lv.kid, floorIdx: lv.floorIdx, floor: floors[lv.floorIdx], mode: 'legacy' };
    }
    return null;
  }

  if (pKey && idx > dayIndex(parseDayKey(pKey)) && vacuumWeekdays().includes(d.getDay())){
    const base = effectiveNext();
    if (!base) return null;
    let steps = 0;
    for (let i = dayIndex(parseDayKey(pKey)) + 1; i <= idx; i++){
      const dd = new Date(START); dd.setDate(dd.getDate() + i);
      if (vacuumWeekdays().includes(dd.getDay())) steps++;
    }
    const c = advanceCombo(base, steps);
    return { kid: c.kid, floorIdx: c.floorIdx, floor: floors[c.floorIdx], mode: 'projected' };
  }
  return null;
}

function dayKey(d){
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function tasksArray(role){
  const obj = tasksCache[role] || {};
  return Object.keys(obj)
    .map(id => ({ id, ...obj[id] }))
    .sort((a,b) => (a.order||0) - (b.order||0));
}

function taskWeekdays(t){
  return Array.isArray(t.weekdays) ? t.weekdays : ALL_WEEKDAYS;
}

function tasksArrayForDay(role, dow){
  return tasksArray(role).filter(t => taskWeekdays(t).includes(dow));
}

// Bevroren eenmalige taken van deze dag (days/{key}/snap/{kid}-{taskId}) voor één kind.
// Zo'n snapshot wordt geschreven op het moment dat een eenmalige taak wordt afgevinkt
// (de definitie wordt dan uit settings/tasks verwijderd) — zonder snapshot zou de rij
// meteen verdwijnen in plaats van afgevinkt te blijven staan. Zelfde idee als days/{key}/vac.
function daySnapsFor(kidKey, state){
  const snap = state.snap || {};
  return Object.keys(snap)
    .filter(k => k.startsWith(kidKey + '-'))
    .map(k => ({ id: k.slice(kidKey.length + 1), ...snap[k] }))
    .sort((a,b) => (a.order||0) - (b.order||0));
}

// --- Firebase: taakinstellingen (permanente listener, hele app-levensduur) ---
onValue(ref(db, 'settings/tasks'), snap => {
  if (!snap.exists()){
    set(ref(db, 'settings/tasks'), DEFAULT_TASKS);
    return; // wacht op de her-fire van deze listener met de echte data
  }
  loadError = null;
  const v = snap.val();
  tasksCache = { A: v.A || {}, B: v.B || {}, lies: v.lies || {}, lenn: v.lenn || {} };
  tasksLoaded = true;
  render();
}, () => {
  loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
  render();
});

// --- Firebase: stofzuiginstellingen (permanente listener, hele app-levensduur) ---
onValue(ref(db, 'settings/vacuum'), snap => {
  if (!snap.exists()){
    set(ref(db, 'settings/vacuum'), DEFAULT_VACUUM);
    return; // wacht op de her-fire van deze listener met de echte data
  }
  loadError = null;
  const v = snap.val();
  vacuumCache = {
    weekdays: v.weekdays || DEFAULT_VACUUM.weekdays.slice(),
    floors: Array.isArray(v.floors) ? v.floors : null,
    next: v.next || null,
    override: typeof v.override === 'string' ? v.override : null,
    lastDone: typeof v.lastDone === 'string' ? v.lastDone : null
  };
  vacuumLoaded = true;
  render();
}, () => {
  loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
  render();
});

// --- Firebase: dagstatus (opnieuw aangesloten bij elke dagwissel) ---
function attachDayListener(d){
  if (dayUnsubscribe){ dayUnsubscribe(); dayUnsubscribe = null; }
  const capturedKey = dayKey(d);
  const myToken = ++dayListenerToken;
  dayLoaded = false;
  dayState = {};
  dayUnsubscribe = onValue(ref(db, `days/${capturedKey}`), snap => {
    if (myToken !== dayListenerToken) return; // laat antwoord voor een inmiddels vervangen listener: negeren
    loadError = null;
    dayState = snap.val() || {};
    dayLoaded = true;
    render();
  }, () => {
    if (myToken !== dayListenerToken) return;
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  });
}
attachDayListener(current);

function render(){
  if (loadError){
    document.getElementById('app').innerHTML = `<div class="loading">${escapeHtml(loadError)}</div>`;
    return;
  }

  if (screen === 'admin'){
    if (!tasksLoaded || !vacuumLoaded){
      document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
      return;
    }
    renderAdmin();
    return;
  }

  if (!tasksLoaded || !dayLoaded || !vacuumLoaded){
    document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
    return;
  }

  const idx = dayIndex(current);
  const roles = getRoles(idx);
  const dow = current.getDay();
  const vac = vacuumForDay(current);
  const state = dayState;

  const kids = [
    ['lies', 'Lies', '--lies', '--lies-bg'],
    ['lenn', 'Lenn', '--lenn', '--lenn-bg']
  ].map(([key, name, color, bg]) => ({
    key, name, color, bg, role: roles[key],
    // roterende roltaken eerst, daarna de vaste kind-taken (👤)
    tasks: tasksArrayForDay(roles[key], dow).concat(tasksArrayForDay(key, dow).map(t => ({ ...t, fixed:true })))
  }));

  const cDay = dayKey(current);
  let allTasks = [];
  let doneCount = 0;
  const newlyDone = []; // kinderen die déze render al hun klusjes af kregen
  kids.forEach(k => {
    // bevroren eenmalige taken van deze dag die niet (meer) in de levende lijst zitten
    k.snaps = daySnapsFor(k.key, state).filter(s => !k.tasks.some(t => t.id === s.id));
    const ids = k.tasks.map(t => `${k.key}-${t.id}`).concat(k.snaps.map(s => `${k.key}-${s.id}`));
    if (vac && vac.kid === k.key && vac.mode !== 'projected') ids.push(`${k.key}-vac`);
    allTasks = allTasks.concat(ids);

    const kidDone = ids.filter(id => state[id]).length;
    doneCount += kidDone;
    const gKey = `${cDay}:${k.key}`;
    if (ids.length > 0 && kidDone === ids.length){
      if (!celebratedDays.has(gKey)){
        celebratedDays.add(gKey);
        newlyDone.push(k.name);
      }
    } else if (kidDone < ids.length){
      // alleen herwapenen bij écht onafgewerkt werk — een tijdelijk lege id-lijst
      // (listener-race rond het bevriezen van een eenmalige taak: definitie al weg,
      // snapshot nog niet binnen) mag de guard niet wissen, anders viert de
      // volgende render dezelfde voltooiing een tweede keer
      celebratedDays.delete(gKey);
    }
  });
  const pct = allTasks.length ? Math.round((doneCount / allTasks.length) * 100) : 0;

  const isToday = dayIndex(current) === dayIndex(new Date());

  const app = document.getElementById('app');
  app.innerHTML = `
    ${isToday ? '' : `<div class="today-row"><button class="today-btn" onclick="goToday()">Ga naar vandaag</button></div>`}
    <div class="nav">
      <button onclick="changeDay(-1)">‹</button>
      <div class="date">
        <div class="weekday">${WD[current.getDay()]}</div>
        <div class="fulldate">${current.getDate()} ${MN[current.getMonth()]}</div>
      </div>
      <button onclick="changeDay(1)">›</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Voortgang</span><span>${doneCount}/${allTasks.length}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    ${kids.map(k => renderCard(k, vac, state)).join('')}

    <div class="footer-row">
      <button class="admin-link" onclick="openAdmin()">⚙️ Beheer</button>
      <div class="version">${VERSION}</div>
    </div>
  `;

  if (newlyDone.length) showCelebration(newlyDone);
}

function renderCard(k, vac, state){
  const tasks = k.tasks.map(t => {
    const id = `${k.key}-${t.id}`;
    const done = !!state[id];
    return taskRow(id, t.label, done, t.fixed);
  }).concat((k.snaps || []).map(s => {
    // bevroren eenmalige taak: blijft afgevinkt zichtbaar; terug aanklikken herstelt ze
    const id = `${k.key}-${s.id}`;
    return taskRow(id, s.label, !!state[id], s.bucket === k.key);
  })).join('');

  const vacRow = (vac && vac.kid === k.key) ? vacuumRow(k.key, vac, state) : '';

  return `
    <div class="card">
      <div class="card-header">
        <div class="dot" style="background:var(${k.color})"></div>
        <div class="name">${k.name}</div>
        <div class="role-badge" style="color:var(${k.color});background:var(${k.bg})">Rol ${k.role}</div>
      </div>
      ${tasks}
      ${vacRow}
    </div>
  `;
}

function taskRow(id, label, done, fixed){
  return `
    <div class="task" onclick="toggleTask('${id}')">
      <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-label ${done ? 'done' : ''}">${escapeHtml(label)}</div>
      ${fixed ? '<span class="fixed-mark" title="Vaste taak">👤</span>' : ''}
    </div>
  `;
}

function vacuumRow(kidKey, vac, state){
  const id = `${kidKey}-vac`;
  const done = !!state[id];
  const label = `🧹 Stofzuigen: ${escapeHtml(vac.floor)}`;
  if (vac.mode === 'projected'){
    // wél aanklikbaar: vooruitwerken (of een blijven-liggen-beurt door een ouder
    // laten vervallen) moet kunnen — zie de projected-tak in toggleTask
    return `
    <div class="task projected" onclick="toggleTask('${id}')">
      <div class="check"></div>
      <div class="task-label">${label}<span class="vac-tag">verwacht</span></div>
    </div>
  `;
  }
  let buttons = '';
  if (!done && vac.floorIdx != null){
    const todayIdx = dayIndex(clampedToday());
    const pKey = pendingVacuumDay();
    const pIdx = pKey ? dayIndex(parseDayKey(pKey)) : null;
    if (vac.mode === 'pending'){
      // drietal: vorige dag, naar vandaag, volgende dag — de eerste twee alleen
      // als de beurt in de toekomst staat (eerder dan vandaag kan niet)
      if (pIdx != null && pIdx > todayIdx){
        buttons += `<button class="postpone-btn" onclick="event.stopPropagation();preponeVacuum()" title="Een dag eerder">${SKIP_BACK_ICON}</button>`;
        buttons += `<button class="postpone-btn" onclick="event.stopPropagation();pullVacuumToToday('${vac.kid}',${vac.floorIdx},null)" title="Haal deze beurt naar vandaag">📥</button>`;
      }
      buttons += `<button class="postpone-btn" onclick="event.stopPropagation();postponeVacuum()" title="Doorschuiven naar de volgende dag">${SKIP_FWD_ICON}</button>`;
    } else if ((vac.mode === 'legacy' || vac.mode === 'done') && dayIndex(current) < todayIdx){
      // bij een snapshot-rij ('done') moet de momentopname mee verhuizen, anders
      // blijft de beurt dubbel staan — vandaar de dag-key als derde argument
      const fromKey = vac.mode === 'done' ? `'${dayKey(current)}'` : 'null';
      buttons += `<button class="postpone-btn" onclick="event.stopPropagation();pullVacuumToToday('${vac.kid}',${vac.floorIdx},${fromKey})" title="Haal deze beurt naar vandaag">📥</button>`;
    }
  }
  return `
    <div class="task" onclick="toggleTask('${id}')">
      <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-label ${done ? 'done' : ''}">${label}<span class="vac-tag">week</span></div>
      ${buttons}
    </div>
  `;
}

// Haalt een beurt naar vandaag: de openstaande beurt (die verderop wacht) of
// een gemiste legacy-beurt uit het verleden. De combo van de aangeklikte rij
// wordt de pointer, zodat de rotatie daarna gewoon vanaf die beurt verdergaat.
function pullVacuumToToday(kid, floorIdx, fromKey){
  const len = vacuumFloors().length;
  update(ref(db, 'settings/vacuum'), {
    override: dayKey(clampedToday()),
    next: { kid, floorIdx: ((floorIdx % len) + len) % len }
  });
  // beurt verhuisd: de bevroren momentopname van de oorspronkelijke dag opruimen
  if (fromKey) remove(ref(db, `days/${fromKey}/vac`));
}

// Zet de openstaande beurt één dag vroeger, maar nooit vroeger dan vandaag.
function preponeVacuum(){
  const pKey = pendingVacuumDay();
  const n = effectiveNext();
  if (!pKey || !n) return;
  const nd = parseDayKey(pKey);
  nd.setDate(nd.getDate() - 1);
  if (dayIndex(nd) < dayIndex(clampedToday())) return;
  // pointer meteen vastleggen zodat de beurt ook op een niet-stofzuigdag blijft kloppen
  update(ref(db, 'settings/vacuum'), { override: dayKey(nd), next: { kid: n.kid, floorIdx: n.floorIdx } });
}

function postponeVacuum(){
  const pKey = pendingVacuumDay();
  const n = effectiveNext();
  if (!pKey || !n) return;
  const nd = parseDayKey(pKey);
  nd.setDate(nd.getDate() + 1);
  if (dayIndex(nd) >= TOTAL_DAYS){ alert('Kan niet voorbij het einde van het schema.'); return; }
  // pointer meteen vastleggen zodat de beurt ook op een niet-stofzuigdag blijft kloppen
  update(ref(db, 'settings/vacuum'), { override: dayKey(nd), next: { kid: n.kid, floorIdx: n.floorIdx } });
}

function toggleTask(id){
  if (id.endsWith('-vac')){
    const info = vacuumForDay(current);
    const kidKey = id.slice(0, id.indexOf('-'));
    if (!info || info.kid !== kidKey) return;
    const key = dayKey(current);
    const newVal = !dayState[id];
    if (info.mode === 'projected' && !newVal) return; // kan niet: projectie is per definitie onaangevinkt
    if (newVal) playChime();
    set(ref(db, `days/${key}/${id}`), newVal);
    if (newVal){
      // historiek bevriezen: wie het was en welke verdieping, los van latere instellingen
      set(ref(db, `days/${key}/vac`), { kid: info.kid, floor: info.floor });
      if (info.mode === 'pending' || info.mode === 'projected'){
        // beurt afgewerkt: pointer één stap voorbij déze combo, eventuele override
        // is opgebruikt. Bij een projectie (vooruitwerken) betekent dit ook dat een
        // nog openstaande eerdere beurt stilzwijgend vervalt — bewust: "de kids
        // deden het niet, een ouder nam het over" mag de rotatie niet blokkeren.
        update(ref(db, 'settings/vacuum'), {
          next: advanceCombo({ kid: info.kid, floorIdx: info.floorIdx }, 1),
          override: null,
          lastDone: key
        });
      }
    } else {
      remove(ref(db, `days/${key}/vac`));
      if (vacuumCache.lastDone === key && vacuumCache.next){
        // het net-afgevinkte ongedaan maken: pointer één stap terug, en de beurt
        // keert terug naar déze dag — afvinken wiste de override, dus zonder dit
        // herstel zou een met 📥/⏮/⏭ verplaatste beurt terugspringen naar de
        // eerstvolgende geplande dag en van deze dag lijken te verdwijnen
        update(ref(db, 'settings/vacuum'), { next: advanceCombo(vacuumCache.next, -1), lastDone: null, override: key });
      }
    }
    return;
  }

  const newVal = !dayState[id];
  const key = dayKey(current);
  const sep = id.indexOf('-');
  const kidKey = id.slice(0, sep);
  const taskId = id.slice(sep + 1);

  if (newVal){
    const role = getRoles(dayIndex(current))[kidKey];
    // taak kan in de roterende rol-bucket zitten óf in de vaste kind-bucket
    let bucket = role, task = tasksCache[role] && tasksCache[role][taskId];
    if (!task && tasksCache[kidKey] && tasksCache[kidKey][taskId]){
      bucket = kidKey; task = tasksCache[kidKey][taskId];
    }
    if (!task && !(dayState.snap && dayState.snap[id])){
      // rij bestaat niet meer (bv. net in een andere sessie verwijderd): geen
      // wees-vinkje schrijven voor iets dat de volgende render toch verdwijnt
      return;
    }
    playChime();
    if (task && task.recurring === false){
      // bevriezen in de dag (zoals days/{key}/vac) + definitie verwijderen + afvinken,
      // atomisch in één multi-path update: een gedeeltelijk gelande write zou anders
      // de rij doen verdwijnen (snap kwijt) of de taak elders laten terugkeren
      const snap = { label: task.label, bucket, order: task.order || 0 };
      if (Array.isArray(task.weekdays)) snap.weekdays = task.weekdays;
      update(ref(db), {
        [`days/${key}/${id}`]: true,
        [`days/${key}/snap/${id}`]: snap,
        [`settings/tasks/${bucket}/${taskId}`]: null
      });
    } else {
      set(ref(db, `days/${key}/${id}`), true);
    }
  } else {
    // uitvinken van een bevroren eenmalige taak: definitie herstellen uit de
    // snapshot, atomisch samen met het uitvinken en het opruimen van de snapshot
    const snap = dayState.snap && dayState.snap[id];
    if (snap){
      const rec = { label: snap.label, recurring: false, order: snap.order || 0 };
      if (Array.isArray(snap.weekdays)) rec.weekdays = snap.weekdays;
      update(ref(db), {
        [`days/${key}/${id}`]: false,
        [`days/${key}/snap/${id}`]: null,
        [`settings/tasks/${snap.bucket}/${taskId}`]: rec
      });
    } else {
      set(ref(db, `days/${key}/${id}`), false);
    }
  }
}

function changeDay(delta){
  const next = new Date(current);
  next.setDate(next.getDate() + delta);
  const idx = dayIndex(next);
  if (idx < 0 || idx >= TOTAL_DAYS) return;
  current = next;
  attachDayListener(current);
  render();
}

function goToday(){
  let today = new Date();
  const idx = dayIndex(today);
  if (idx < 0) today = new Date(START);
  if (idx >= TOTAL_DAYS) today = new Date(START.getTime() + (TOTAL_DAYS - 1) * 86400000);
  current = today;
  attachDayListener(current);
  render();
}

// Geluid: gesynthetiseerd via Web Audio (geen extern geluidsbestand — de app moet
// één zelfstandig bestand blijven). De AudioContext wordt lazy aangemaakt binnen de
// klik zelf, wat op iOS vereist is om geluid te mogen spelen. Alle audio zit in
// try/catch: geluid is nice-to-have en mag nooit een state-write of popup blokkeren.
let audioCtx = null;
let lastChimeAt = 0;

// één toon met zachte fade-in/uit — abrupte starts/stops zijn precies wat tikken/kraken geeft
function tone(t0, freq, start, dur, vol, type){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, t0 + start);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + start + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0 + start);
  osc.stop(t0 + start + dur + 0.05);
}

// Kort belletje bij het afvinken: twee zachte sinustonen, een vriendelijk "ding-ding".
function playChime(){
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    lastChimeAt = Date.now();
    const t0 = audioCtx.currentTime;
    tone(t0, 880,     0,    0.45, 0.2, 'sine');
    tone(t0, 1174.66, 0.07, 0.45, 0.2, 'sine');
  } catch (e) {
    // zie audio-opmerking hierboven
  }
}

// Vrolijke "ta-da-da-daaa!"-fanfare bij de proficiat-popup: stijgende do-mi-sol
// gevolgd door een gedragen C-majeurakkoord met een sprankeltje erbovenop.
// Zuivere toonsynthese — geen ruis, die kraakt op telefoonspeakers.
function playFanfare(){
  try {
    if (!audioCtx) return; // nog geen enkele tik deze sessie (bv. vers geopende afgewerkte dag): stil
    if (audioCtx.state !== 'running'){
      // net getikt maar de (iOS-)resume is nog async onderweg: toch inplannen, hij
      // start zodra de context loopt. Zónder recente tik overslaan — anders zou een
      // opgespaarde fanfare bij de eerstvolgende tik plots alsnog afgaan.
      if (Date.now() - lastChimeAt > 3000) return;
      audioCtx.resume();
    }
    const t0 = audioCtx.currentTime;
    tone(t0, 523.25, 0,    0.20, 0.22); // C5  ta-
    tone(t0, 659.25, 0.12, 0.20, 0.22); // E5  da-
    tone(t0, 783.99, 0.24, 0.20, 0.22); // G5  da-
    tone(t0, 1046.5, 0.36, 1.10, 0.26); // C6  daaa! (slotakkoord)
    tone(t0, 1318.5, 0.36, 1.10, 0.16); // E6
    tone(t0, 783.99, 0.36, 1.10, 0.14); // G5
    tone(t0, 2093.0, 0.46, 0.90, 0.07, 'sine'); // sprankel (C7)
  } catch (e) {
    // zie audio-opmerking hierboven
  }
}

function showCelebration(names){
  // per kind gevierd; als beide kinderen in dezelfde render klaar zijn (bv. bij het
  // openen van een al volledig afgewerkte dag) komt er één gezamenlijke popup
  playFanfare();
  const old = document.getElementById('celebration');
  if (old) old.remove();
  const title = `Proficiat ${names.join(' & ')}!`;
  const sub = names.length === 1
    ? `Alle klusjes van ${names[0]} zijn gedaan.`
    : 'Alle klusjes van vandaag zijn gedaan.';
  const div = document.createElement('div');
  div.id = 'celebration';
  div.className = 'celebration';
  div.innerHTML = `
    <div class="celebration-card">
      <div class="celebration-emoji">🎉</div>
      <div class="celebration-title">${title}</div>
      <div class="celebration-sub">${sub}</div>
      <button class="celebration-close" onclick="document.getElementById('celebration').remove()">Toppie</button>
    </div>
  `;
  document.body.appendChild(div);
}

// --- Admin ---
function openAdmin(){
  if (!adminUnlocked){ showPasswordPrompt(); return; }
  screen = 'admin';
  render();
}

// Gemaskeerd wachtwoordvenster i.p.v. prompt() (die de tekens leesbaar toont).
function showPasswordPrompt(){
  if (document.getElementById('pwmodal')) return;
  const div = document.createElement('div');
  div.id = 'pwmodal';
  div.className = 'celebration';
  div.innerHTML = `
    <div class="celebration-card">
      <div class="celebration-title">Wachtwoord</div>
      <input id="pwinput" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" class="pw-input" placeholder="Wachtwoord">
      <div id="pwerror" class="pw-error"></div>
      <div class="pw-actions">
        <button class="pw-cancel" onclick="closePasswordPrompt()">Annuleren</button>
        <button class="pw-ok" onclick="submitPassword()">OK</button>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  const inp = document.getElementById('pwinput');
  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); submitPassword(); }
    else if (e.key === 'Escape'){ e.preventDefault(); closePasswordPrompt(); }
  });
}

function submitPassword(){
  const inp = document.getElementById('pwinput');
  if (!inp) return;
  if (inp.value !== ADMIN_PASSWORD){
    document.getElementById('pwerror').textContent = 'Fout wachtwoord';
    inp.value = '';
    inp.focus();
    return;
  }
  adminUnlocked = true;
  closePasswordPrompt();
  screen = 'admin';
  render();
}

function closePasswordPrompt(){
  const m = document.getElementById('pwmodal');
  if (m) m.remove();
}

function backToDay(){
  screen = 'day';
  render();
}

function renderAdmin(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="admin-header">
      <button class="admin-back" onclick="backToDay()">‹ Terug</button>
      <div class="admin-title">Beheer taken</div>
    </div>
    ${renderAdminRole('A', 'Rol A')}
    ${renderAdminRole('B', 'Rol B')}
    ${renderAdminRole('lies', 'Vaste taken — Lies')}
    ${renderAdminRole('lenn', 'Vaste taken — Lenn')}
    ${renderAdminVacuum()}
    <div class="version">${VERSION}</div>
  `;
}

function renderWeekdayPicker(activeDays, role, id){
  const handler = role
    ? `toggleWeekday('${role}','${id}',`
    : `toggleVacuumWeekday(`;
  return `
    <div class="admin-weekday-row">
      ${WD.map((name, i) => `
        <button class="admin-day-btn ${activeDays.includes(i) ? 'active' : ''}" onclick="${handler}${i})">${name.slice(0,2)}</button>
      `).join('')}
    </div>
  `;
}

function renderAdminRole(role, title){
  const rows = tasksArray(role).map(t => {
    const days = taskWeekdays(t);
    return `
    <div class="admin-task-row">
      <div class="admin-task-top">
        <span class="admin-tag">${t.recurring ? 'Terugkerend' : 'Eenmalig'}</span>
        <div class="admin-task-label">${escapeHtml(t.label)}</div>
        <button class="admin-icon-btn" onclick="toggleRecurring('${role}','${t.id}')">🔁</button>
        <button class="admin-icon-btn" onclick="editTaskLabel('${role}','${t.id}')">✏️</button>
        <button class="admin-icon-btn danger" onclick="deleteTaskAdmin('${role}','${t.id}')">${TRASH_ICON}</button>
      </div>
      ${renderWeekdayPicker(days, role, t.id)}
      ${days.length === 0 ? '<div class="admin-never">Nooit actief</div>' : ''}
    </div>
  `;
  }).join('');

  return `
    <div class="admin-section">
      <div class="admin-role-title">${title}</div>
      ${rows}
      <button class="admin-add-btn" onclick="addTaskAdmin('${role}')">+ Taak toevoegen</button>
    </div>
  `;
}

function renderAdminVacuum(){
  const days = vacuumWeekdays();
  const floors = vacuumFloors();
  const n = effectiveNext();
  const pKey = pendingVacuumDay();
  const pd = pKey ? parseDayKey(pKey) : null;
  const nextRow = (n && pd) ? `
    <div class="admin-next-row">
      <span>Volgende beurt: <b>${KID_NAMES[n.kid]}</b> — ${escapeHtml(floors[n.floorIdx])}<br>
      <small>op ${WD[pd.getDay()]} ${pd.getDate()} ${MN[pd.getMonth()]}${vacuumCache.override ? ' (doorgeschoven)' : ''}</small></span>
      <button class="admin-icon-btn accent" onclick="rewindVacuumTurn()" title="Beurt terugdraaien">${SKIP_BACK_ICON}</button>
      <button class="admin-icon-btn accent" onclick="advanceVacuumTurn()" title="Beurt doorschuiven">${SKIP_FWD_ICON}</button>
    </div>
  ` : '';
  const floorRows = floors.map((f, i) => `
    <div class="admin-task-row">
      <div class="admin-task-top">
        <div class="admin-task-label">${escapeHtml(f)}</div>
        <button class="admin-icon-btn" onclick="editFloor(${i})">✏️</button>
        <button class="admin-icon-btn danger" onclick="deleteFloor(${i})">${TRASH_ICON}</button>
      </div>
    </div>
  `).join('');
  return `
    <div class="admin-section">
      <div class="admin-role-title">Stofzuigen</div>
      ${renderWeekdayPicker(days, null, null)}
      ${days.length === 0 ? '<div class="admin-never">Nooit actief</div>' : ''}
      ${nextRow}
      ${floorRows}
      <button class="admin-add-btn" onclick="addFloor()">+ Verdieping toevoegen</button>
      <div class="admin-vacuum-note">Een niet-afgevinkte beurt schuift automatisch door naar de volgende stofzuigdag, voor hetzelfde kind.</div>
    </div>
  `;
}

function advanceVacuumTurn(){
  const n = effectiveNext();
  if (!n) return;
  update(ref(db, 'settings/vacuum'), { next: advanceCombo(n, 1) });
}

function rewindVacuumTurn(){
  const n = effectiveNext();
  if (!n) return;
  update(ref(db, 'settings/vacuum'), { next: advanceCombo(n, -1) });
}

function addFloor(){
  const label = prompt('Nieuwe verdieping:');
  if (!label) return;
  update(ref(db, 'settings/vacuum'), { floors: [...vacuumFloors(), label] });
}

function editFloor(i){
  const floors = vacuumFloors();
  if (!floors[i]) return;
  const label = prompt('Naam van de verdieping:', floors[i]);
  if (!label) return;
  const nf = floors.slice(); nf[i] = label;
  update(ref(db, 'settings/vacuum'), { floors: nf });
}

function deleteFloor(i){
  const floors = vacuumFloors();
  if (!floors[i]) return;
  if (floors.length <= 1){ alert('Er moet minstens één verdieping blijven.'); return; }
  if (!confirm(`Verdieping "${floors[i]}" verwijderen?`)) return;
  const nf = floors.slice(); nf.splice(i, 1);
  const upd = { floors: nf };
  const n = vacuumCache.next;
  if (n && Number.isInteger(n.floorIdx)){
    let fi = n.floorIdx;
    if (fi > i) fi -= 1;
    if (fi >= nf.length) fi = 0;
    if (fi !== n.floorIdx) upd.next = { kid: n.kid, floorIdx: fi };
  }
  update(ref(db, 'settings/vacuum'), upd);
}

function editTaskLabel(role, id){
  const t = tasksCache[role] && tasksCache[role][id];
  if (!t) return;
  const label = prompt('Naam van de taak:', t.label);
  if (!label) return;
  update(ref(db, `settings/tasks/${role}/${id}`), { label });
}

function toggleRecurring(role, id){
  const t = tasksCache[role] && tasksCache[role][id];
  if (!t) return;
  update(ref(db, `settings/tasks/${role}/${id}`), { recurring: !t.recurring });
}

function deleteTaskAdmin(role, id){
  if (!confirm('Deze taak verwijderen?')) return;
  remove(ref(db, `settings/tasks/${role}/${id}`));
}

function addTaskAdmin(role){
  const label = prompt('Nieuwe taak:');
  if (!label) return;
  const recurring = confirm('Terugkerende taak (elke dag)?\nOK = ja, terugkerend\nAnnuleren = eenmalig');
  push(ref(db, `settings/tasks/${role}`), { label, recurring, order: Date.now() });
}

function toggleWeekday(role, id, dayNum){
  const t = tasksCache[role] && tasksCache[role][id];
  if (!t) return;
  const days = taskWeekdays(t);
  const next = days.includes(dayNum) ? days.filter(d => d !== dayNum) : [...days, dayNum].sort((a,b) => a-b);
  update(ref(db, `settings/tasks/${role}/${id}`), { weekdays: next });
}

function toggleVacuumWeekday(dayNum){
  const days = vacuumWeekdays();
  const next = days.includes(dayNum) ? days.filter(d => d !== dayNum) : [...days, dayNum].sort((a,b) => a-b);
  update(ref(db, 'settings/vacuum'), { weekdays: next });
}

Object.assign(window, {
  toggleTask, changeDay, goToday, openAdmin, backToDay,
  editTaskLabel, toggleRecurring, deleteTaskAdmin, addTaskAdmin,
  toggleWeekday, toggleVacuumWeekday,
  postponeVacuum, preponeVacuum, pullVacuumToToday, advanceVacuumTurn, rewindVacuumTurn,
  addFloor, editFloor, deleteFloor,
  submitPassword, closePasswordPrompt
});

render();
</script>
</body>
</html>
