// Maakt het ouderaccount aan, of — als het e-mailadres al bestaat — probeert
// met dezelfde gegevens in te loggen en dat account te hergebruiken. Dat heelt
// gestrande accounts (aangemaakt maar nooit aan een gezin gekoppeld, bv. door
// een eerder afgebroken create/join): een nieuwe poging loopt dan niet meer
// vast op "e-mail al in gebruik". Klopt het wachtwoord niet met het bestaande
// account, dan gooien we de oorspronkelijke already-in-use-fout door.
async function ensureAccount(email, pw){
  try {
    return (await createUserWithEmailAndPassword(auth, email, pw)).user;
  } catch (err){
    if (!err || err.code !== 'auth/email-already-in-use') throw err;
    try {
      return (await signInWithEmailAndPassword(auth, email, pw)).user;
    } catch (e2){
      throw err;
    }
  }
}

// Het gezin van dit account, of null. (userIndex/{uid} is de wegwijzer; enkel
// door de uid zelf leesbaar — wij zíjn die uid.) Zit het account al in een gezin,
// dan niet nóg eens aanmaken/aansluiten maar dat gezin gewoon openen.
async function familyIdOf(uid){
  const idx = await get(baseRef('userIndex/' + uid));
  return idx.exists() ? idx.val() : null;
}

function enterAppAfterAuth(){
  authBusy = false;
  authError = null;
  authMode = 'login';
  screen = 'day';
  render();
}

// Nieuw gezin aanmaken: eerst de gezinsnaam via prompt() (vóór de accountaanmaak,
// zodat annuleren niets achterlaat), dan het account via ensureAccount, dan een
// unieke code en TWEE opeenvolgende schrijven:
//   (1) bootstrap: meta + members/{uid} + familyCodes + userIndex — gedekt door de
//       bootstrap-uitzonderingen in de rules (meta/familyCodes: !data.exists;
//       members: eerste-lid-self-insert; userIndex: self).
//   (2) settings: tasks + vacuum + shifts — PAS na de bootstrap, want de
//       settings-regel is ouder-only op basis van `root` (de stáát vóór de schrijf),
//       en pas ná (1) is de aanmaker een vastgelegd ouder-lid. Eén atomische create
//       met settings erin zou door de rules geweigerd worden (root kent het lid nog
//       niet). Faalt (2), dan zaait de app de settings alsnog lui bij het openen.
// Alle sleutels krijgen de BASE_ROOT-prefix (sandbox-basis) — NIET de gezins-scope
// DB_ROOT, want die zetten we pas ná de schrijven via startFamily.
async function submitCreateFamily(){
  const emailInp = document.getElementById('authEmail');
  const pwInp = document.getElementById('authPw');
  const email = emailInp ? emailInp.value.trim() : '';
  const pw = pwInp ? pwInp.value : '';
  if (!email || !pw){
    authError = 'Vul e-mailadres en wachtwoord in.';
    render();
    return;
  }
  const naam = (prompt('Naam van het gezin:') || '').trim();
  if (!naam){
    authError = 'Geef een gezinsnaam op om het gezin aan te maken.';
    render();
    return;
  }
  authError = null;
  authBusy = true;
  render();

  let user;
  try {
    user = await ensureAccount(email, pw);
  } catch (err){
    authBusy = false;
    authError = authErrorMessage(err && err.code);
    render();
    return;
  }

  try {
    const existingFid = await familyIdOf(user.uid);
    if (existingFid){
      startFamily(existingFid);
      enterAppAfterAuth();
      alert('Dit account hoort al bij een gezin — je bent ermee ingelogd.');
      return;
    }
    const newFid = push(baseRef('families')).key;
    const code = await generateUniqueFamilyCode();
    // (1) bootstrap — hierna is de aanmaker een vastgelegd ouder-lid
    const bootstrap = {};
    bootstrap[BASE_ROOT + `families/${newFid}/meta`] = { naam, gezinscode: code, aangemaakt: dayKey(new Date()) };
    bootstrap[BASE_ROOT + `families/${newFid}/members/${user.uid}`] = { rol: 'ouder', weergavenaam: defaultDisplayName(email), actief: true };
    bootstrap[BASE_ROOT + 'familyCodes/' + code] = newFid;
    bootstrap[BASE_ROOT + 'userIndex/' + user.uid] = newFid;
    await update(ref(db), bootstrap);
    // (2) settings — nu toegestaan door de ouder-only settings-regel
    const settings = {};
    settings[BASE_ROOT + `families/${newFid}/settings/tasks`] = DEFAULT_TASKS;
    settings[BASE_ROOT + `families/${newFid}/settings/shifts`] = DEFAULT_SHIFTS;
    await update(ref(db), settings);

    startFamily(newFid);
    enterAppAfterAuth();
    alert(`Gezin "${naam}" is aangemaakt!\nGezinscode: ${code}\nDeel deze code met de andere ouder om aan te sluiten.`);
  } catch (err){
    authBusy = false;
    authError = 'Aanmaken van het gezin is mislukt. Probeer het opnieuw.';
    render();
  }
}

// Aansluiten bij een bestaand gezin: account via ensureAccount, dan de opgegeven
// code opzoeken in /familyCodes (mag pas gelezen worden als je bent ingelogd),
// en tot slot zelf-insert in members/{uid} — de rules verifiëren de code
// server-side tegen meta/gezinscode (zie firebase-rules-v16.json §5).
async function submitJoinFamily(){
  const emailInp = document.getElementById('authEmail');
  const pwInp = document.getElementById('authPw');
  const codeInp = document.getElementById('authCode');
  const email = emailInp ? emailInp.value.trim() : '';
  const pw = pwInp ? pwInp.value : '';
  const code = (codeInp ? codeInp.value : '').trim().toUpperCase();
  if (!email || !pw || !code){
    authError = 'Vul e-mailadres, wachtwoord en gezinscode in.';
    render();
    return;
  }
  authError = null;
  authBusy = true;
  render();

  let user;
  try {
    user = await ensureAccount(email, pw);
  } catch (err){
    authBusy = false;
    authError = authErrorMessage(err && err.code);
    render();
    return;
  }

  try {
    const existingFid = await familyIdOf(user.uid);
    if (existingFid){
      startFamily(existingFid);
      enterAppAfterAuth();
      alert('Dit account hoort al bij een gezin — je bent ermee ingelogd.');
      return;
    }
    const snap = await get(baseRef('familyCodes/' + code));
    const fid = snap.exists() ? snap.val() : null;
    if (!fid){
      // Uitloggen (geen half-lid laten rondhangen), maar de foutmelding via het
      // pending-mechanisme zetten: onAuthStateChanged(null) kan vóór of ná de
      // regels hieronder lopen en zou de melding anders overschrijven. Dubbel
      // zetten is bewust — zo klopt de state in beide volgordes. Dankzij
      // ensureAccount kan de gebruiker het daarna gewoon opnieuw proberen.
      pendingAuthError = 'Ongeldige gezinscode.';
      pendingAuthMode = 'join';
      await signOut(auth);
      authBusy = false;
      authError = 'Ongeldige gezinscode.';
      authMode = 'join';
      render();
      return;
    }
    const writes = {};
    writes[BASE_ROOT + `families/${fid}/members/${user.uid}`] = { rol: 'ouder', weergavenaam: defaultDisplayName(email), actief: true, viaCode: code };
    writes[BASE_ROOT + 'userIndex/' + user.uid] = fid;
    await update(ref(db), writes);

    startFamily(fid);
    enterAppAfterAuth();
  } catch (err){
    authBusy = false;
    authError = 'Aansluiten is mislukt. Probeer het opnieuw.';
    render();
  }
}

function logout(){

}

// --- Gezinsleden beheren (screen 'members') ---
// Los van "Beheer taken": hier leven de accounts (kinderen + mede-ouders),
// daar de klusjes. Kind-accounts worden aangemaakt via een TWEEDE, tijdelijke
// app-instantie zodat de ouder ingelogd blijft (createUser logt de maker in).

function membersArray(rol){
  return Object.keys(membersCache)
    .filter(uid => (membersCache[uid].rol || 'kind') === rol)
    .map(uid => ({ uid, ...membersCache[uid] }))
    .sort((a, b) => String(a.weergavenaam).localeCompare(String(b.weergavenaam)));
}

function copyFamilyCode(){
  const code = metaCache && metaCache.gezinscode;
  if (!code) return;
  const fallback = () => prompt('Kopieer de gezinscode:', code);
  try {
    navigator.clipboard.writeText(code).then(() => {
      const b = document.getElementById('copyCodeBtn');
      if (b) b.textContent = '✅';
    }, fallback);
  } catch (e) { fallback(); }
}

// Maakt (of hergebruikt) het kind-account in een tijdelijke secundaire app en
// geeft de kid-uid terug. Volgorde die de rules respecteert (PLAN-v16 fase 4):
//   1. secundair: createUser(username@kids…, pin) → ingelogd als kind;
//   2. secundair (als kind): userIndex/{kidUid} = familyId (mag: eigen uid);
//   3. primair (als ouder): members/{kidUid} = {rol:'kind', …} (mag: ouder).
// Bestaat het e-mailadres al, dan proberen we secundair in te loggen met de
// opgegeven pin: lukt dat én hoort het account nog nergens (of al bij dít
// gezin — een eerder gestrande poging), dan hechten we het alsnog aan. Anders
// is de naam echt bezet.
async function createChildAccount(username, pin){
  const secApp = initializeApp(firebaseConfig, 'secondary-' + Date.now());
  const secAuth = getAuth(secApp);
  const secDb = getDatabase(secApp);
  try {
    const pw = pinToPassword(pin);
    let kidUser;
    try {
      kidUser = (await createUserWithEmailAndPassword(secAuth, kidEmail(username), pw)).user;
    } catch (err){
      if (!err || err.code !== 'auth/email-already-in-use') throw err;
      try {
        kidUser = (await signInWithEmailAndPassword(secAuth, kidEmail(username), pw)).user;
      } catch (e2){
        throw { code: 'name-taken' };
      }
      const idx = await get(ref(secDb, BASE_ROOT + 'userIndex/' + kidUser.uid));
      if (idx.exists() && idx.val() !== familyId) throw { code: 'name-taken' };
    }
    // als kind de eigen wegwijzer zetten (self-only volgens de rules)
    await set(ref(secDb, BASE_ROOT + 'userIndex/' + kidUser.uid), familyId);
    return kidUser.uid;
  } finally {
    try { await signOut(secAuth); } catch (e) {}
    try { await deleteApp(secApp); } catch (e) {}
  }
}

async function addChildMember(){
  const rawName = prompt('Gebruikersnaam van het kind (waarmee het inlogt):');
  if (rawName === null) return;
  const username = normalizeUsername(rawName);
  if (username.length < 2){
    alert('Gebruik minstens 2 letters of cijfers (spaties en leestekens tellen niet mee).');
    return;
  }
  const display = (prompt('Weergavenaam (zoals op de kaart):',
    rawName.trim().charAt(0).toUpperCase() + rawName.trim().slice(1)) || '').trim();
  if (!display) return;
  const pin = prompt('Pincode (minstens 4 cijfers):');
  if (pin === null) return;
  if (!isValidPin(pin)){
    alert('De pincode moet uit minstens 4 cijfers bestaan.');
    return;
  }
  // Vanaf hier draait een netwerk-round-trip (account aanmaken + members-write):
  // de bezig-overlay tonen zodat de app niet vastgevroren lijkt tijdens het wachten.
  memberBusy = true;
  render();
  try {
    const kidUid = await createChildAccount(username, pin.trim());
    if (membersCache[kidUid]){
      alert(`"${display}" is al lid van dit gezin.`);
      return;
    }
    // als ouder (primaire app) het lid vastleggen
    await update(dbRef('members/' + kidUid), {
      rol: 'kind', weergavenaam: display, gebruikersnaam: username,
      kleur: nextFreeColor(), actief: true
    });
    alert(`${display} is toegevoegd. Inloggen kan met gebruikersnaam "${username}" en de gekozen pincode.`);
  } catch (err){
    if (err && err.code === 'name-taken'){
      alert('Deze naam is al in gebruik, kies een andere.');
    } else if (err && err.code === 'auth/weak-password'){
      alert('De pincode moet uit minstens 4 cijfers bestaan.');
    } else if (err && err.code === 'auth/network-request-failed'){
      alert('Geen internetverbinding. Probeer het opnieuw.');
    } else {
      alert('Kind toevoegen is niet gelukt. Probeer het opnieuw.');
    }
  } finally {
    // overlay weer weg (ook bij de vroege return hierboven en bij elke fout);
    // render() toont meteen de bijgewerkte ledenlijst
    memberBusy = false;
    render();
  }
}

// Pincode wijzigen vereist de HUIDIGE pin (beslispunt uit het plan): zonder
// Admin-SDK/Cloud Function kan een client een andermans wachtwoord niet
// resetten. Een vergeten pin is dus een bekende beperking — het kind-account
// kan dan alleen via een nieuw account (andere naam) opnieuw meedoen.
async function changeChildPin(uid){
  const m = membersCache[uid];
  if (!m || !m.gebruikersnaam) return;
  const oldPin = prompt(`Huidige pincode van ${m.weergavenaam}:\n(zonder de huidige pin kan de pincode niet gewijzigd worden)`);
  if (oldPin === null) return;
  const newPin = prompt('Nieuwe pincode (minstens 4 cijfers):');
  if (newPin === null) return;
  if (!isValidPin(newPin)){
    alert('De nieuwe pincode moet uit minstens 4 cijfers bestaan.');
    return;
  }
  const secApp = initializeApp(firebaseConfig, 'secondary-' + Date.now());
  const secAuth = getAuth(secApp);
  try {
    const cred = await signInWithEmailAndPassword(secAuth, kidEmail(m.gebruikersnaam), pinToPassword(oldPin));
    await updatePassword(cred.user, pinToPassword(newPin));
    alert('Pincode gewijzigd.');
  } catch (err){
    if (err && (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential')){
      alert('De huidige pincode klopt niet.');
    } else if (err && err.code === 'auth/weak-password'){
      alert('De nieuwe pincode moet uit minstens 4 cijfers bestaan.');
    } else {
      alert('Pincode wijzigen is niet gelukt. Probeer het opnieuw.');
    }
  } finally {
    try { await signOut(secAuth); } catch (e) {}
    try { await deleteApp(secApp); } catch (e) {}
  }
}

}

function editStreakStart(){
  const cur = parseDayKey(streakStartKey) || parseDayKey(DEFAULT_STREAK_START);
  const pad = n => String(n).padStart(2, '0');
  const preset = `${pad(cur.getDate())}-${pad(cur.getMonth() + 1)}-${cur.getFullYear()}`;
  const inp = prompt('Reeksen & badges tellen vanaf welke dag? (dd-mm-jjjj)', preset);
  if (!inp) return;
  const m = inp.trim().match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if (!m){ alert('Ongeldige datum. Gebruik dd-mm-jjjj, bijvoorbeeld 09-07-2026.'); return; }
  const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
  if (isNaN(d.getTime()) || d.getDate() !== Number(m[1]) || d.getMonth() !== Number(m[2]) - 1){
    alert('Ongeldige datum. Controleer dag en maand.'); return;
  }
  set(dbRef('settings/streakStart'), dayKey(d));
}

// Eén taaklijst; elke taak toont wie meedraait (rotatie of vast), het interval, de
// weekdagen en — bij echte rotatie — wie vandaag aan de beurt is met ⏮/⏭ om de
// startvolgorde bij te stellen. Geen A/B-buckets meer.
function renderAdminTasks(){
  const kids = activeKids();
  const idx = dayIndex(clampedToday());
  // losgemaakte beurten (fromShift) zijn tijdelijke eenmalige taken — niet in Beheer tonen
  const rows = taskList().filter(t => !t.fromShift).map(t => {
    const days = taskWeekdays(t);
    const explicit = Array.isArray(t.members) && t.members.length > 0;
    const memberChips = kids.map(k => {
      const on = explicit ? t.members.includes(k.uid) : true;
      return `<button class="admin-day-btn admin-kid-btn ${on ? 'active' : ''}" style="--kidkleur:${k.kleur}" onclick="toggleTaskMember('${t.id}','${k.uid}')">${escapeHtml(k.name)}</button>`;
    }).join('');
    const ring = taskRing(t);
    const assignee = taskAssignee(t, idx);
    const rotates = ring.length > 1;
    const intervalLabel = t.interval === 'weekly' ? 'Wekelijks' : 'Dagelijks';
    const turnRow = rotates ? `
      <div class="admin-next-row">
        <span>Vandaag aan de beurt: <b>${escapeHtml(memberName(assignee))}</b><br>
        <small>${intervalLabel.toLowerCase()} wisselend</small></span>
        <button class="admin-icon-btn accent" onclick="rewindTaskPointer('${t.id}')" title="Startvolgorde terug">${SKIP_BACK_ICON}</button>
        <button class="admin-icon-btn accent" onclick="advanceTaskPointer('${t.id}')" title="Startvolgorde door">${SKIP_FWD_ICON}</button>
      </div>` : `<div class="admin-vacuum-note">Vaste taak van ${escapeHtml(memberName(ring[0]) || '—')}.</div>`;
    return `
    <div class="admin-task-row">
      <div class="admin-task-top">
        <span class="admin-tag">${t.recurring ? 'Terugkerend' : 'Eenmalig'}</span>
        <div class="admin-task-label">${escapeHtml(t.label)}</div>
        <span class="admin-task-actions">
          <button class="admin-icon-btn" onclick="toggleRecurring('${t.id}')" title="Terugkerend / eenmalig">🔁</button>
          <button class="admin-icon-btn" onclick="toggleTaskInterval('${t.id}')" title="Dagelijks / wekelijks wisselen">${t.interval === 'weekly' ? '📅' : '🗓️'}</button>
          <button class="admin-icon-btn" onclick="editTaskLabel('${t.id}')" title="Naam wijzigen">✏️</button>
          <button class="admin-icon-btn danger" onclick="deleteTaskAdmin('${t.id}')" title="Taak verwijderen">${TRASH_ICON}</button>
        </span>
      </div>
      ${renderWeekdayPicker(days, `toggleWeekday('${t.id}',`)}
      ${days.length === 0 ? '<div class="admin-never">Nooit actief</div>' : ''}
      <div class="admin-weekday-row" style="flex-wrap:wrap;margin-top:6px;">${memberChips || '<span class="admin-vacuum-note">Nog geen kinderen.</span>'}</div>
      ${turnRow}
    </div>
  `;
  }).join('');

  return `
    <div class="admin-section">
      <div class="admin-role-title">Taken</div>
      ${rows}
      <button class="admin-add-btn" onclick="addTaskAdmin()">+ Taak toevoegen</button>
      <div class="admin-vacuum-note">Kies per taak wie meedraait: één kind = vaste taak, meer kinderen = rotatie (dagelijks of wekelijks). Met ⏮/⏭ stel je in wie begint.</div>
    </div>
  `;
}

// Eén beheersectie per beurt-taak. Elke beurt-taak: naam, weekdagen, lijnen
// (bijplaatsbaar/bewerkbaar/verwijderbaar), deelnemers (elk actief kind aan/uit),
// en de volgende beurt met ⏮/⏭. Plus een knop om een nieuwe beurt-taak te maken.
function renderAdminShifts(){
  const kids = activeKids();
  const sections = shiftsArray().map(sh => {
    const days = shiftWeekdays(sh);
    const lines = shiftLines(sh);
    const ring = shiftMembers(sh);
    const n = shiftEffectiveNext(sh);
    const pKey = shiftPendingDay(sh);
    const pd = pKey ? parseDayKey(pKey) : null;
    const nextRow = (n && pd) ? `
      <div class="admin-next-row">
        <span>Volgende beurt: <b>${escapeHtml(memberName(n.uid))}</b> — ${escapeHtml(lines[n.lineIdx])}<br>
        <small>op ${WD[pd.getDay()]} ${pd.getDate()} ${MN[pd.getMonth()]}${sh.override ? ' (doorgeschoven)' : ''}</small></span>
        <button class="admin-icon-btn accent" onclick="rewindShiftTurn('${sh.id}')" title="Beurt terugdraaien">${SKIP_BACK_ICON}</button>
        <button class="admin-icon-btn accent" onclick="advanceShiftTurn('${sh.id}')" title="Beurt doorschuiven">${SKIP_FWD_ICON}</button>
      </div>
    ` : '';
    const lineRows = lines.map((f, i) => `
      <div class="admin-task-row">
        <div class="admin-task-top">
          <div class="admin-task-label">${escapeHtml(f)}</div>
          <span class="admin-task-actions">
            <button class="admin-icon-btn" onclick="editShiftLine('${sh.id}',${i})">✏️</button>
            <button class="admin-icon-btn danger" onclick="deleteShiftLine('${sh.id}',${i})">${TRASH_ICON}</button>
          </span>
        </div>
      </div>
    `).join('');
    // deelnemers: leeg = iedereen; toon per actief kind een aan/uit-knop
    const explicit = Array.isArray(sh.members) && sh.members.length > 0;
    const memberChips = kids.map(k => {
      const on = explicit ? sh.members.includes(k.uid) : true;
      return `<button class="admin-day-btn admin-kid-btn ${on ? 'active' : ''}" style="--kidkleur:${k.kleur}" onclick="toggleShiftMember('${sh.id}','${k.uid}')">${escapeHtml(k.name)}</button>`;
    }).join('');
    return `
      <div class="admin-section">
        <div class="admin-task-top" style="margin-bottom:10px;">
          <div class="admin-role-title" style="margin:0;flex:1;">🔁 ${escapeHtml(sh.name || 'Beurt')}</div>
          <span class="admin-task-actions">
            <button class="admin-icon-btn" onclick="renameShift('${sh.id}')" title="Naam wijzigen">✏️</button>
            <button class="admin-icon-btn danger" onclick="deleteShift('${sh.id}')" title="Beurt-taak verwijderen">${TRASH_ICON}</button>
          </span>
        </div>
        ${renderWeekdayPicker(days, `toggleShiftWeekday('${sh.id}',`)}
        ${days.length === 0 ? '<div class="admin-never">Nooit actief</div>' : ''}
        ${nextRow}
        <div class="admin-role-title" style="font-size:13px;margin:12px 0 6px;">Lijnen</div>
        ${lineRows}
        <button class="admin-add-btn" onclick="addShiftLine('${sh.id}')">+ Lijn toevoegen</button>
        <div class="admin-role-title" style="font-size:13px;margin:12px 0 6px;">Wie draait mee?</div>
        <div class="admin-weekday-row" style="flex-wrap:wrap;">${memberChips || '<span class="admin-vacuum-note">Nog geen kinderen in het gezin.</span>'}</div>
        <div class="admin-vacuum-note">Een niet-afgevinkte beurt schuift automatisch door naar de volgende dag, voor dezelfde persoon.</div>
      </div>
    `;
  }).join('');
  return `
    ${sections}
    <div class="admin-section">
      <button class="admin-add-btn" onclick="addShift()">+ Beurt-taak toevoegen</button>
    </div>
  `;
}

function advanceShiftTurn(shiftId){
  const sh = shiftsArray().find(s => s.id === shiftId);
  const n = sh && shiftEffectiveNext(sh);
  if (!n) return;
  update(dbRef('settings/shifts/' + shiftId), { next: shiftAdvance(sh, n, 1) });
}
function rewindShiftTurn(shiftId){
  const sh = shiftsArray().find(s => s.id === shiftId);
  const n = sh && shiftEffectiveNext(sh);
  if (!n) return;
  update(dbRef('settings/shifts/' + shiftId), { next: shiftAdvance(sh, n, -1) });
}

function addShift(){
  const name = (prompt('Naam van de nieuwe beurt-taak (bv. Afwas):') || '').trim();
  if (!name) return;
  push(dbRef('settings/shifts'), {
    name, weekdays: DEFAULT_VACUUM.weekdays.slice(), lines: ['Beurt'], members: [],
    next: null, override: null, lastDone: null, order: Date.now()
  });
}
function renameShift(shiftId){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const name = (prompt('Naam van de beurt-taak:', sh.name || '') || '').trim();
  if (!name) return;
  update(dbRef('settings/shifts/' + shiftId), { name });
}
function deleteShift(shiftId){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  if (!confirm(`Beurt-taak "${sh.name || ''}" verwijderen?`)) return;
  remove(dbRef('settings/shifts/' + shiftId));
}

function addShiftLine(shiftId){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const label = (prompt('Nieuwe lijn:') || '').trim();
  if (!label) return;
  update(dbRef('settings/shifts/' + shiftId), { lines: [...shiftLines(sh), label] });
}
function editShiftLine(shiftId, i){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const lines = shiftLines(sh);
  if (!lines[i]) return;
  const label = (prompt('Naam van de lijn:', lines[i]) || '').trim();
  if (!label) return;
  const nf = lines.slice(); nf[i] = label;
  update(dbRef('settings/shifts/' + shiftId), { lines: nf });
}
function deleteShiftLine(shiftId, i){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const lines = shiftLines(sh);
  if (!lines[i]) return;
  if (lines.length <= 1){ alert('Er moet minstens één lijn blijven.'); return; }
  if (!confirm(`Lijn "${lines[i]}" verwijderen?`)) return;
  const nf = lines.slice(); nf.splice(i, 1);
  const upd = { lines: nf };
  const n = sh.next;
  if (n && Number.isInteger(n.lineIdx)){
    let li = n.lineIdx;
    if (li > i) li -= 1;
    if (li >= nf.length) li = 0;
    if (li !== n.lineIdx) upd.next = { uid: n.uid, lineIdx: li };
  }
  update(dbRef('settings/shifts/' + shiftId), upd);
}

// Deelnemer aan/uit. Leeg members-veld = iedereen; de eerste keer dat je iemand
// uitzet, materialiseren we de expliciete lijst (alle actieve kinderen minus die).
function toggleShiftMember(shiftId, uid){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const explicit = Array.isArray(sh.members) && sh.members.length > 0;
  const current = explicit ? sh.members.slice() : activeKids().map(k => k.uid);
  const next = current.includes(uid) ? current.filter(u => u !== uid) : [...current, uid];
  if (!next.length){ alert('Er moet minstens één deelnemer blijven.'); return; }
  // als de lijst weer exact "alle actieve kinderen" is, terug naar leeg (= iedereen)
  const allKids = activeKids().map(k => k.uid);
  const isAll = next.length === allKids.length && allKids.every(u => next.includes(u));
  update(dbRef('settings/shifts/' + shiftId), { members: isAll ? [] : next });
}

function editTaskLabel(id){
  const t = tasksCache[id];
  if (!t) return;
  const label = prompt('Naam van de taak:', t.label);
  if (!label) return;
  update(dbRef(`settings/tasks/${id}`), { label });
}

function toggleRecurring(id){
  const t = tasksCache[id];
  if (!t) return;
  update(dbRef(`settings/tasks/${id}`), { recurring: !t.recurring });
}

function toggleTaskInterval(id){
  const t = tasksCache[id];
  if (!t) return;
  update(dbRef(`settings/tasks/${id}`), { interval: t.interval === 'weekly' ? 'daily' : 'weekly' });
}

function deleteTaskAdmin(id){
  if (!confirm('Deze taak verwijderen?')) return;
  remove(dbRef(`settings/tasks/${id}`));
}

function addTaskAdmin(){
  const label = prompt('Nieuwe taak:');
  if (!label) return;
  const recurring = confirm('Terugkerende taak (elke dag)?\nOK = ja, terugkerend\nAnnuleren = eenmalig');
  // standaard: alle kinderen (leeg members), dagelijkse rotatie vanaf pointer 0
  push(dbRef('settings/tasks'), { label, recurring, order: Date.now(), members: [], pointer: 0 });
}

function toggleWeekday(id, dayNum){
  const t = tasksCache[id];
  if (!t) return;
  const days = taskWeekdays(t);
  const next = days.includes(dayNum) ? days.filter(d => d !== dayNum) : [...days, dayNum].sort((a,b) => a-b);
  update(dbRef(`settings/tasks/${id}`), { weekdays: next });
}

// Deelnemer aan/uit (zelfde patroon als bij shifts): leeg members = iedereen; bij
// het eerste uitzetten materialiseren we de expliciete lijst; wordt het weer exact
// "alle actieve kinderen", dan terug naar leeg.
function toggleTaskMember(id, uid){
  const t = tasksCache[id]; if (!t) return;
  const explicit = Array.isArray(t.members) && t.members.length > 0;
  const cur = explicit ? t.members.slice() : activeKids().map(k => k.uid);
  const next = cur.includes(uid) ? cur.filter(u => u !== uid) : [...cur, uid];
  if (!next.length){ alert('Er moet minstens één kind meedraaien.'); return; }
  const allKids = activeKids().map(k => k.uid);
  const isAll = next.length === allKids.length && allKids.every(u => next.includes(u));
  update(dbRef(`settings/tasks/${id}`), { members: isAll ? [] : next });
}

// Startvolgorde bijstellen: verschuift de pointer één plaats (wie vandaag begint).
function advanceTaskPointer(id){
  const t = tasksCache[id]; if (!t) return;
  const len = taskRing(t).length || 1;
  const ptr = ((((Number.isInteger(t.pointer) ? t.pointer : 0) + 1) % len) + len) % len;
  update(dbRef(`settings/tasks/${id}`), { pointer: ptr });
}
function rewindTaskPointer(id){
  const t = tasksCache[id]; if (!t) return;
  const len = taskRing(t).length || 1;
  const ptr = ((((Number.isInteger(t.pointer) ? t.pointer : 0) - 1) % len) + len) % len;
  update(dbRef(`settings/tasks/${id}`), { pointer: ptr });
}

function toggleShiftWeekday(shiftId, dayNum){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const days = shiftWeekdays(sh);
  const next = days.includes(dayNum) ? days.filter(d => d !== dayNum) : [...days, dayNum].sort((a,b) => a-b);
  update(dbRef('settings/shifts/' + shiftId), { weekdays: next });
}

Object.assign(window, {
  toggleTask, toggleShift, changeDay, goToday, openAdmin, backToDay, openBadges,
  editTaskLabel, toggleRecurring, toggleTaskInterval, deleteTaskAdmin, addTaskAdmin,
  toggleWeekday, toggleTaskMember, advanceTaskPointer, rewindTaskPointer, editStreakStart,
  shiftPrepone, shiftPostpone, shiftPull, moveOwedShift, advanceShiftTurn, rewindShiftTurn,
  addShift, renameShift, deleteShift, addShiftLine, editShiftLine, deleteShiftLine,
  toggleShiftMember, toggleShiftWeekday,
  submitLogin, submitKidLogin, logout, switchAuthMode, submitCreateFamily, submitJoinFamily,
  openMembers, addChildMember, changeChildPin, renameMember, renameFamily, cycleMemberColor,
  toggleMemberActive, deleteMember, copyFamilyCode, explainAddParent
});

render();
</script>
