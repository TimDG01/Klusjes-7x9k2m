<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Klusjes">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)">
<title>Klusjesschema</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--text:#1C1C1E;
  --text2:#6C6C70;--text3:#AEAEB2;
  --border:rgba(0,0,0,0.12);--track:#E5E5EA;
  --vac:#946200;--vac-bg:#FBEFD2;
  --green:#1D9E75;--blue:#378ADD;--red:#D5493A;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1C1C1E;--card:#2C2C2E;--text:#FFFFFF;
    --text2:#AEAEB2;--text3:#636366;
    --border:rgba(255,255,255,0.14);--track:#3A3A3C;
    --vac-bg:#3D2E08;
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding-top:max(16px,env(safe-area-inset-top));
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
#app{max-width:420px;margin:0 auto;padding:0 14px 40px;}
button{font-family:inherit;font-size:inherit;-webkit-tap-highlight-color:transparent;border:none;background:none;cursor:pointer;}

.today-row{display:flex;justify-content:center;margin-bottom:10px;}
.today-btn{font-size:13px;font-weight:600;color:var(--blue);background:var(--card);padding:6px 16px;border-radius:10px;}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.nav button{width:38px;height:38px;border-radius:50%;background:var(--card);font-size:18px;display:flex;align-items:center;justify-content:center;}
.nav .date{text-align:center;flex:1;}
.nav .weekday{font-size:13px;color:var(--text2);text-transform:capitalize;}
.nav .fulldate{font-size:17px;font-weight:600;}

.progress-wrap{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:8px;}
.progress-track{height:8px;border-radius:4px;background:var(--track);overflow:hidden;}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s ease;}

.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dot{width:10px;height:10px;border-radius:50%;}
.name{font-size:16px;font-weight:700;}
.role-badge{margin-left:auto;font-size:12px;font-weight:600;padding:3px 9px;border-radius:8px;}

.task{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.task:last-child{border-bottom:none;}
.check{width:24px;height:24px;border-radius:7px;border:2px solid var(--track);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:white;transition:all .15s ease;}
.check.done{background:var(--green);border-color:var(--green);}
.task-label{font-size:15px;flex:1;}
.task-label.done{color:var(--text3);text-decoration:line-through;}
.fixed-mark{font-size:12px;opacity:.55;flex-shrink:0;margin-left:2px;}
.vac-tag{font-size:11px;font-weight:600;color:var(--vac);background:var(--vac-bg);padding:2px 7px;border-radius:6px;margin-left:6px;}
.postpone-btn{font-size:15px;padding:2px 4px;flex-shrink:0;color:var(--blue);}
.postpone-btn svg{display:block;}

.celebration{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.celebration-card{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;}
.celebration-emoji{font-size:56px;margin-bottom:12px;}
.celebration-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.celebration-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
.celebration-close{background:var(--green);color:white;font-weight:600;padding:11px 28px;border-radius:12px;font-size:15px;}

.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:14px;}
.auth-card{background:var(--card);border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%;}
.auth-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:18px;}
.auth-links{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
.auth-link{font-size:13px;font-weight:600;color:var(--blue);}
/* Gedeelde invoer/knop-stijl van álle auth-formulieren (login, aanmaken,
   aansluiten én kind-login). Kind gebruikt dezelfde stijl, enkel groter
   (.kid-input/.kid-btn hieronder), zodat kind- en ouder-inloggen er identiek
   uitzien — geen apart "pop-up"-achtig kader meer. */
.pw-input{width:100%;font-size:16px;padding:11px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);margin:6px 0 4px;text-align:center;}
.pw-error{font-size:12px;color:var(--red);min-height:16px;margin-bottom:12px;}
.pw-ok{background:var(--green);color:#fff;font-weight:600;font-size:15px;padding:12px 0;border-radius:12px;}
.pw-ok:disabled{opacity:.6;}
.kid-input{font-size:20px;padding:14px 12px;}
/* Pincode-veld: geen echt type=password, zodat de browser er geen "wachtwoord
   gelekt"-controle op loslaat (korte cijfercodes staan altijd in lek-databases).
   Wel gemaskeerd met bolletjes via -webkit-text-security (WebKit/iOS — het
   doeltoestel is een iOS home-screen-bookmark). */
.pin-mask{-webkit-text-security:disc;}
.kid-btn{font-size:17px;padding:14px 0;}

.footer-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:20px;}
.admin-link{font-size:13px;font-weight:600;color:var(--text2);background:var(--card);padding:8px 16px;border-radius:10px;}
.version{text-align:center;font-size:11px;color:var(--text3);}
.testmode{text-align:center;font-size:12px;font-weight:700;color:#fff;background:var(--red);padding:4px 12px;border-radius:8px;letter-spacing:1px;}

.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px;}

.footer-btns{display:flex;gap:10px;}
.streak-strip{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;margin:2px 0 8px;border-radius:10px;background:var(--track);font-size:13px;text-align:left;}
.streak-flame{font-weight:700;white-space:nowrap;}
.streak-flame.off{opacity:.45;filter:grayscale(1);}
.streak-dots{display:flex;gap:4px;flex:1;justify-content:center;}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--border);}
.sdot.on{background:var(--green);}
.streak-joker{font-size:12px;}
.streak-chip{font-weight:600;white-space:nowrap;}

.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.badge-card{position:relative;overflow:hidden;border-radius:14px;padding:14px 10px 12px;text-align:center;background:linear-gradient(150deg,var(--bc1),var(--bc2));color:#fff;}
.badge-card svg{display:block;margin:0 auto;}
.badge-name{font-weight:700;font-size:14px;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,.3);}
.badge-date{font-size:11px;opacity:.85;margin-top:2px;}
.badge-level{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;background:rgba(0,0,0,.28);vertical-align:middle;}
.badge-card.locked{background:var(--track);color:var(--text2);}
.badge-card.locked svg{filter:grayscale(1);opacity:.35;}
.badge-card.locked .badge-name{text-shadow:none;}
.badge-card:not(.locked)::after{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.4) 48%,transparent 58%);transform:translateX(-130%);animation:shine 4s ease-in-out 1s infinite;pointer-events:none;}
@keyframes shine{0%{transform:translateX(-130%);}45%,100%{transform:translateX(130%);}}
.badge-card.new{animation:pop-in .55s cubic-bezier(.2,1.4,.4,1);}
@keyframes pop-in{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}

.celebration-badge{margin:2px 0 18px;}
.celebration-badge svg{display:block;margin:0 auto;animation:pop-in .6s cubic-bezier(.2,1.4,.4,1);}
.celebration-badge-name{font-size:15px;margin-top:8px;}

/* Bezig-overlay bij trage leden-acties (bv. kind toevoegen): een echte
   draaiende ring-spinner, zodat de app niet bevroren lijkt terwijl er op de
   databank gewacht wordt (net als het authBusy-patroon, maar met spinner). */
.busy-overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.5);}
.busy-spinner{width:44px;height:44px;border-radius:50%;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin .8s linear infinite;}
.busy-text{color:#fff;font-size:15px;font-weight:600;}
@keyframes spin{to{transform:rotate(360deg);}}

.admin-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.admin-back{font-size:14px;font-weight:600;color:var(--blue);background:var(--card);padding:8px 14px;border-radius:10px;}
.admin-title{font-size:18px;font-weight:700;flex:1;}
.admin-section{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;}
.admin-role-title{font-size:15px;font-weight:700;margin-bottom:10px;}
.admin-task-row{display:flex;flex-direction:column;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);}
.admin-task-row:last-of-type{border-bottom:none;}
/* flex-wrap + de knoppen gegroepeerd in .admin-task-actions: past de rij niet op
   een smal scherm, dan zakt de knoppengroep als geheel naar een eigen regel
   (rechts uitgelijnd) i.p.v. buiten beeld geduwd te worden of het label tot een
   sliert te knijpen. min-width geeft het label een leesbare ondergrens. */
.admin-task-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.admin-task-label{flex:1;font-size:14px;min-width:88px;overflow-wrap:break-word;}
.admin-task-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex:0 0 auto;}
.admin-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--track);color:var(--text2);}
.admin-icon-btn{font-size:16px;padding:4px 6px;}
.admin-icon-btn svg{display:block;}
.admin-icon-btn.danger{color:var(--red);vertical-align:middle;}
.admin-icon-btn.accent{color:var(--blue);}
.admin-add-btn{margin-top:8px;font-size:14px;font-weight:600;color:var(--blue);}
.admin-weekday-row{display:flex;gap:4px;}
.admin-day-btn{flex:1;height:30px;border-radius:7px;font-size:11px;font-weight:600;text-transform:capitalize;background:var(--track);color:var(--text2);display:flex;align-items:center;justify-content:center;}
.admin-day-btn.active{background:var(--green);color:#fff;}
/* Kind-knopjes ("wie draait mee") — bewust anders dan de dagknopjes: ronde pil
   in de eigen kleur van het kind (zelfde kleur als zijn kaart op het dagscherm),
   zodat "wie" en "wanneer" niet als twee rijen identieke knoppen lezen. */
.admin-kid-btn{flex:0 0 auto;padding:0 14px;border-radius:999px;text-transform:none;}
.admin-kid-btn.active{background:var(--kidkleur,var(--green));color:#fff;}
.admin-never{font-size:11px;color:var(--red);}
.admin-vacuum-note{font-size:12px;color:var(--text2);margin-top:6px;}
.admin-next-row{display:flex;align-items:center;gap:6px;font-size:14px;padding:10px 0 6px;border-bottom:1px solid var(--border);}
.admin-next-row span{flex:1;}
.admin-next-row small{color:var(--text2);}
.member-sub{font-size:11px;color:var(--text2);}
.family-code{font-size:22px;letter-spacing:4px;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, get, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// =====================================================================
// KLUSJES-PWA v16 — accountmodel & datamodel in het kort
// ---------------------------------------------------------------------
// Meerdere gezinnen in één app (Firebase-project klusjesv2).
//  • Ouder logt in met e-mail + wachtwoord. Kind logt in met gebruikersnaam
//    + pincode → intern omgezet naar {naam}@kids.klusjesv2.app (zie kidEmail).
//  • Na login wijst userIndex/{uid} naar het gezin; álle gezinsdata leeft
//    genest onder families/{familyId}/ (meta, members, settings, days, streaks).
//  • dbRef(path)/rootUpdate(obj) prefixen automatisch de gezins-scope
//    (families/{fid}/) plus BASE_ROOT; baseRef() is voor de wegwijzers
//    (userIndex/familyCodes) die je vóór je gezin al nodig hebt.
//  • Beheer hangt aan de ouder-rol (isParent), niet meer aan een wachtwoord.
//  • ?test schrijft alles onder /test/… (oefendata; rode TESTMODUS-melding) —
//    bewust behouden: handig voor veilig testen en de migratie-dry-run.
//  • Eenmalige overzet van oude v15-data: los bestand migratie.html (niet in de app).
// =====================================================================

const firebaseConfig = {
  apiKey: "AIzaSyBMLoS2ybJV-G0cYOIP_PHcc3BAbdAXI2c",
  authDomain: "klusjesv2.firebaseapp.com",
  databaseURL: "https://klusjesv2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "klusjesv2",
  storageBucket: "klusjesv2.firebasestorage.app",
  messagingSenderId: "1066695207859",
  appId: "1:1066695207859:web:3a5a9dfdde234b02acb9c6"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);
const auth = getAuth(firebaseApp);
// Persistentie is nice-to-have: als dit faalt (bv. een browser zonder bruikbare
// storage) moet de app gewoon opstarten — de sessie is dan alleen niet blijvend.
// Zonder try/catch zou een rejectie hier de hele module (incl. render) afbreken.
try { await setPersistence(auth, browserLocalPersistence); } catch (e) {}


const START = new Date(2026, 5, 26); // 26 juni 2026 — het schema loopt vanaf hier onbeperkt door
// Reeksen & badges tellen pas vanaf deze dag. Alles ervoor (oude /days-historiek
// van vóór de badges bestonden) telt niet mee, ook niet als je ernaartoe bladert.
// Instelbaar via Beheer → bewaard in /settings/streakStart (dayKey-string); deze
// constante is enkel de fallback zolang dat veld nog niet bestaat.
const DEFAULT_STREAK_START = '2026-7-9'; // 9 juli 2026
let streakStartKey = DEFAULT_STREAK_START;
function streakStartIdx(){
  const d = parseDayKey(streakStartKey) || parseDayKey(DEFAULT_STREAK_START);
  return Math.max(0, dayIndex(d));
}
const SEARCH_HORIZON = 370; // zoeklimiet (dagen) voor vooruitzoeken naar een stofzuigdag, tegen eindeloze lussen bij rare configuraties
const VERSION = 'klusjes-pwa v16';

// Sandbox-basis: met ?test in de URL leeft álles onder /test/... in de database,
// zodat je kunt experimenteren zonder de echte data te raken. In v16 is dit de
// vaste basis; de gezins-scope komt er ná login bovenop (zie DB_ROOT). ?test op een
// echt toestel vereist nog een /test-regel in de rules — geparkeerd tot fase 9.
const BASE_ROOT = new URLSearchParams(location.search).has('test') ? 'test/' : '';
// DB_ROOT is dynamisch: vóór login gelijk aan de basis (nodig voor de bootstrap-
// schrijf bij gezin aanmaken/aansluiten), ná login `…families/{familyId}/`, zodat
// ELKE bestaande DB-toegang (settings/…, days/…, streaks/…) via dbRef/rootUpdate
// vanzelf onder het juiste gezin nestelt — de listeners veranderen inhoudelijk niet.
let DB_ROOT = BASE_ROOT;
const dbRef = path => ref(db, DB_ROOT + path);
// multi-path updates op de root moeten hun sleutels óók prefixen
const rootUpdate = obj => update(ref(db), Object.fromEntries(
  Object.entries(obj).map(([k, v]) => [DB_ROOT + k, v])
));
// De twee top-level wegwijzers (userIndex, familyCodes) staan bewust NIET onder een
// gezin — je hebt ze nodig vóór je je familyId kent. Ze volgen wel BASE_ROOT, zodat
// ?test ook hen sandboxt. Bare, niet-gezins-geprefixte toegang: de bewuste
// uitzondering op de dbRef-regel (zie PLAN-v16 §3).
const baseRef = path => ref(db, BASE_ROOT + path);
const WD = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MN = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const FLOORS = ['gelijkvloers','Verdiep ouders','Verdiep kinderen']; // fallback zolang settings/vacuum/floors ontbreekt

// --- Dynamische gezinsleden (fase 5/6: geen hardcoded lies/lenn meer) ---
// De kaarten op het dagscherm zijn de actieve kind-leden, gesorteerd op uid:
// die volgorde is stabiel (hernoemen of heractiveren verschuift de rolverdeling
// niet). Het volwaardige rotatiemodel (§2.3, met anker/pointer) komt in fase 6.
function activeKids(){
  return Object.keys(membersCache)
    .filter(uid => (membersCache[uid].rol || 'kind') === 'kind' && membersCache[uid].actief !== false)
    .sort()
    .map(uid => ({ uid, name: membersCache[uid].weergavenaam || '?', kleur: membersCache[uid].kleur || KID_COLORS[0] }));
}
function memberName(uid){
  return (membersCache[uid] && membersCache[uid].weergavenaam) || '?';
}
function isChild(){
  return !!(authUser && membersCache[authUser.uid] && membersCache[authUser.uid].rol === 'kind');
}
// Beheer hangt sinds fase 7 aan de ouder-rol i.p.v. een client-side wachtwoord.
// Positieve rolcheck: alleen een ingelogd lid met rol 'ouder' mag beheren.
function isParent(){
  return !!(authUser && membersCache[authUser.uid] && membersCache[authUser.uid].rol === 'ouder');
}
// lijntekeningen i.p.v. emoji's (🗑 ⏭ ⏮): kleur-emoji's negeren CSS `color` en de
// zwarte ⏭/⏮-glyfen verdwijnen op een donkere achtergrond — deze SVG's volgen currentColor
const TRASH_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M18 7l-1 13a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 7"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
const SKIP_FWD_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>';
const SKIP_BACK_ICON = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 4 9 12 19 20 19 4"/><line x1="5" y1="5" x2="5" y2="19"/></svg>';

// De badge-ladder: het n-de verdiende badge (chronologisch) krijgt ontwerp n.
// Na de laatste (13 ontwerpen) begint de ladder opnieuw op een hoger niveau
// ("Ster II", …) zodat de verzameling nooit ophoudt. c1/c2 = kleurverloop van
// medaille én kaart; c3 (optioneel) = extra tussenstop voor een iriserend verloop.
const BADGES = [
  { name:'Ster',              c1:'#F5B301', c2:'#FFE083' },
  { name:'Komeet',            c1:'#0FA3A3', c2:'#7FE3DC' },
  { name:'Medaille',          c1:'#B4693B', c2:'#E8A87C' },
  { name:'Bliksem',           c1:'#1F6FEB', c2:'#7CB8FF' },
  { name:'Trofee',            c1:'#D98E04', c2:'#FFC94D' },
  { name:'Diamant',           c1:'#22C1DC', c2:'#8E7CF3' },
  { name:'Vlam',              c1:'#E8590C', c2:'#FFC078' },
  { name:'Kroon',             c1:'#7048E8', c2:'#FFD43B' },
  { name:'Raket',             c1:'#5C677D', c2:'#E5383B' },
  { name:'Schild',            c1:'#2B8A3E', c2:'#8CE99A' },
  { name:'Ster van de Zomer', c1:'#F06595', c2:'#FFA94D' },
  { name:'Legende',           c1:'#845EF7', c2:'#FF8787', c3:'#22B8CF' }, // iriserend: extra tussenstop
  { name:'Trots op jou',      c1:'#E64980', c2:'#FF9FB3' } // warm hart als slot van de ladder
];

function roman(n){
  const R = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  return R[n] || String(n);
}

function badgeDesign(rank){
  const idx = rank % BADGES.length;
  return { ...BADGES[idx], idx, level: Math.floor(rank / BADGES.length) + 1 };
}

// donkerder/lichter maken van een #rrggbb-kleur (f<1 = donkerder)
function shade(hex, f){
  const n = parseInt(hex.slice(1), 16);
  const c = v => Math.max(0, Math.min(255, Math.round(v * f)));
  return '#' + [c((n >> 16) & 255), c((n >> 8) & 255), c(n & 255)]
    .map(v => v.toString(16).padStart(2, '0')).join('');
}

function starPath(cx, cy, R, r, rot = -90){
  const pts = [];
  for (let i = 0; i < 10; i++){
    const a = (rot + i * 36) * Math.PI / 180;
    const rad = i % 2 === 0 ? R : r;
    pts.push(`${(cx + rad * Math.cos(a)).toFixed(1)} ${(cy + rad * Math.sin(a)).toFixed(1)}`);
  }
  return `M${pts.join(' L')} Z`;
}

function sunRays(cx, cy, r1, r2, n){
  let s = '';
  for (let i = 0; i < n; i++){
    const a = (i * 360 / n - 90) * Math.PI / 180;
    s += `<line x1="${(cx + r1 * Math.cos(a)).toFixed(1)}" y1="${(cy + r1 * Math.sin(a)).toFixed(1)}" x2="${(cx + r2 * Math.cos(a)).toFixed(1)}" y2="${(cy + r2 * Math.sin(a)).toFixed(1)}"/>`;
  }
  return `<g stroke="#fff" stroke-width="3.6" stroke-linecap="round">${s}</g>`;
}

// Bouwt één medaille op: lint-uiteinden achteraan, ring met kleurverloop,
// donkerder binnenschijf, het motief, en een glans-accent. Gradient-id per
// instantie uniek, anders vervuilen meerdere medailles op één scherm elkaars
// kleuren.
// Golvende (scalloped) rand rond de medaille — de klassieke medaille-look: n
// bultjes tussen binnenstraal rIn en buitenstraal rOut, als vloeiende bogen.
function scallopPath(cx, cy, rIn, rOut, n){
  const p = (r, a) => `${(cx + r * Math.cos(a)).toFixed(1)} ${(cy + r * Math.sin(a)).toFixed(1)}`;
  let d = '';
  for (let i = 0; i < n; i++){
    const a0 = (i / n) * 2 * Math.PI - Math.PI / 2;
    const a1 = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
    const am = (a0 + a1) / 2;
    d += (i === 0 ? `M${p(rIn, a0)}` : '') + ` Q${p(rOut, am)} ${p(rIn, a1)}`;
  }
  return d + ' Z';
}

const KIDS_EMAIL_DOMAIN = 'kids.klusjesv2.app';

// blijven gewoon werken. Deze omzetting MOET overal identiek gebeuren
// (aanmaken, pin wijzigen, inloggen), anders matcht de login niet.
const PIN_MIN = 4;
const PIN_PAD = '00';
function isValidPin(pin){ return new RegExp('^\\d{' + PIN_MIN + ',}$').test(String(pin || '').trim()); }

function escapeHtml(str){

function dayIndex(d){

// --- Beurt-taken (shifts): helpers ---
// shiftsArray geeft de beurt-taken op volgorde; elk item draagt zijn id mee.
function shiftsArray(){
  return Object.keys(shiftsCache)
    .map(id => ({ id, ...shiftsCache[id] }))
    .sort((a, b) => (a.order || 0) - (b.order || 0) || String(a.name || '').localeCompare(String(b.name || '')));
}
// De ring waarover een beurt-taak roteert = de opgegeven deelnemers, of (leeg/afwezig)
// álle actieve kinderen. We filteren steeds op nog-actieve kind-leden, zodat een
// verwijderd/gepauzeerd kind niet meer aan de beurt komt. De pointer bewaart de UID
// (niet een index) — robuust als de ledenlijst wijzigt.
function shiftMembers(sh){
  const active = uid => membersCache[uid] && membersCache[uid].rol === 'kind' && membersCache[uid].actief !== false;
  const m = Array.isArray(sh.members) ? sh.members.filter(active) : [];
  return m.length ? m : activeKids().map(k => k.uid);
}
function shiftLines(sh){
  return (Array.isArray(sh.lines) && sh.lines.length > 0) ? sh.lines : FLOORS;
}
function shiftWeekdays(sh){
  return Array.isArray(sh.weekdays) ? sh.weekdays : DEFAULT_VACUUM.weekdays;
}

function parseDayKey(key){
  const [y, m, d] = String(key).split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}

function clampedToday(){
  const t = new Date();
  return t < START ? new Date(START) : t;
}

function shiftNextScheduledDayFrom(sh, d){
  const days = shiftWeekdays(sh);
  if (!days.length) return null;
  const from = Math.max(0, dayIndex(d));
  for (let i = from; i < from + SEARCH_HORIZON; i++){
    const dd = new Date(START); dd.setDate(dd.getDate() + i);
    if (days.includes(dd.getDay())) return dd;
  }
  return null;
}

// De dag waarop de openstaande beurt van deze shift staat: de override-dag als die
// vandaag of later valt, anders de eerstvolgende geplande dag vanaf vandaag. Een
// gemiste beurt schuift zo vanzelf door — zelfde kind, zelfde lijn.
function shiftPendingDay(sh){
  let from = clampedToday();
  const ld = sh.lastDone ? parseDayKey(sh.lastDone) : null;
  if (ld && dayIndex(ld) >= dayIndex(from)){
    // de beurt van vandaag (of vooruitgewerkt: later) is al gedaan — de volgende
    // begint pas op de eerste geplande dag daarna
    from = new Date(ld.getFullYear(), ld.getMonth(), ld.getDate() + 1);
  }
  const ov = sh.override;
  if (ov){
    const od = parseDayKey(ov);
    if (od){
      // Een override in het verleden (een blijven-liggen-beurt terwijl de klok
      // doortikt) niet weggooien maar mee-schuiven naar vandaag, zodat de beurt
      // zichtbaar en aanklikbaar blijft i.p.v. door te springen naar de volgende dag.
      return dayIndex(od) >= dayIndex(from) ? dayKey(od) : dayKey(from);
    }
  }
  const nd = shiftNextScheduledDayFrom(sh, from);
  return nd ? dayKey(nd) : null;
}

// De openstaande beurt-combo van een shift: de pointer uit de database (mits hij
// naar een lid van de ring wijst), anders het begin van de ring (eerste lid, lijn 0).
// Geen legacy-kalenderformule meer in het live pad — op klusjesv2 is elke shift vers
// met een geldige start; de fase-8-migratie berekent zelf de begin-pointer.
function shiftEffectiveNext(sh){
  const lines = shiftLines(sh);
  const ring = shiftMembers(sh);
  const n = sh.next;
  if (n && ring.includes(n.uid) && Number.isInteger(n.lineIdx)){
    return { uid: n.uid, lineIdx: ((n.lineIdx % lines.length) + lines.length) % lines.length };
  }
  return ring.length ? { uid: ring[0], lineIdx: 0 } : null;
}

// Ring over de deelnemers van de shift: elke stap schuift lid én lijn één plaats
// door — met twee leden exact de oude flip. Werkt ook met 1 of 3+ deelnemers.
function shiftAdvance(sh, combo, steps){
  const ring = shiftMembers(sh);
  const lines = shiftLines(sh);
  const ri = ring.indexOf(combo.uid);
  const nr = ring.length;
  return {
    uid: nr ? ring[(((ri < 0 ? 0 : ri) + steps) % nr + nr) % nr] : combo.uid,
    lineIdx: ((combo.lineIdx + steps) % lines.length + lines.length) % lines.length
  };
}

// Bepaalt wat een shift op dag d toont (of null):
//  'done'      – snapshot uit days/{key}/shift/{shiftId} (bevroren historiek)
//  'pending'   – de ene openstaande beurt (interactief, met doorschuifknoppen)
//  'projected' – vooruitblik alsof elke beurt gedaan wordt, niet interactief
// sh moet zijn id dragen (kom van shiftsArray()).
function shiftForDay(sh, d){
  const lines = shiftLines(sh);
  const snap = dayState.shift && dayState.shift[sh.id];
  if (snap && snap.uid){
    const li = lines.indexOf(snap.line);
    return { uid: snap.uid, line: snap.line, lineIdx: li >= 0 ? li : null, mode: 'done' };
  }

  const key = dayKey(d);
  const pKey = shiftPendingDay(sh);
  if (pKey && key === pKey){
    const n = shiftEffectiveNext(sh);
    return n ? { uid: n.uid, lineIdx: n.lineIdx, line: lines[n.lineIdx], mode: 'pending' } : null;
  }

  const idx = dayIndex(d);
  if (idx < dayIndex(clampedToday())) return null; // verleden zonder snapshot: niets

  if (pKey && idx > dayIndex(parseDayKey(pKey)) && shiftWeekdays(sh).includes(d.getDay())){
    const base = shiftEffectiveNext(sh);
    if (!base) return null;
    let steps = 0;
    for (let i = dayIndex(parseDayKey(pKey)) + 1; i <= idx; i++){
      const dd = new Date(START); dd.setDate(dd.getDate() + i);
      if (shiftWeekdays(sh).includes(dd.getDay())) steps++;
    }
    const c = shiftAdvance(sh, base, steps);
    return { uid: c.uid, lineIdx: c.lineIdx, line: lines[c.lineIdx], mode: 'projected' };
  }
  return null;
}

// Alle shift-rijen voor één kind op de huidige dag: [{ sh, info }] waar info.uid
// het kind is. sh draagt zijn id.
function shiftsForKid(uid){
  return shiftsArray()
    .map(sh => ({ sh, info: shiftForDay(sh, current) }))
    .filter(x => x.info && x.info.uid === uid);
}

function dayKey(d){
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

// versieregel onderaan elk scherm; in testmodus met een duidelijk niet te
// missen marker zodat een testtoestel nooit voor de echte app wordt aanzien
function versionLine(){
  // uitlog-knop niet op het auth-scherm zelf: tijdens create/join is er al even
  // een ingelogde gebruiker terwijl het aanmeldformulier nog zichtbaar is
  const showLogout = authUser && screen !== 'auth';
  return `${BASE_ROOT ? '<div class="testmode">TESTMODUS — oefendata, telt niet mee</div>' : ''}${showLogout ? '<button class="admin-link" onclick="logout()">Uitloggen</button>' : ''}<div class="version">${VERSION}</div>`;
}

// --- Taak-rotatie (§2.3): geen A/B-buckets meer. Taken staan plat in
// settings/tasks/{taskId} met optioneel `members` (de rotatie-ring), `interval`
// ('daily'|'weekly'), `anchorIdx` en `pointer`. Wie vandaag aan de beurt is volgt
// uit één formule. Vaste taak = precies één deelnemer; leeg/afwezig = alle kinderen.
function taskList(){
  return Object.keys(tasksCache)
    .map(id => ({ id, ...tasksCache[id] }))
    .sort((a,b) => (a.order||0) - (b.order||0));
}

function taskWeekdays(t){
  return Array.isArray(t.weekdays) ? t.weekdays : ALL_WEEKDAYS;
}

// De ring van een taak: opgegeven deelnemers (gefilterd op nog-actieve kinderen),
// of leeg/afwezig = álle actieve kinderen. Zelfde idee als bij de beurt-taken.
function taskRing(t){
  const active = uid => membersCache[uid] && membersCache[uid].rol === 'kind' && membersCache[uid].actief !== false;
  const m = Array.isArray(t.members) ? t.members.filter(active) : [];
  return m.length ? m : activeKids().map(k => k.uid);
}

// Wie is op dagindex idx aan de beurt voor taak t (of null als er niemand is).
// interval 'weekly' laat de beurt per week i.p.v. per dag doorschuiven.
function taskAssignee(t, idx){
  const ring = taskRing(t);
  if (!ring.length) return null;
  const anchor = Number.isInteger(t.anchorIdx) ? t.anchorIdx : 0;
  const ptr = Number.isInteger(t.pointer) ? t.pointer : 0;
  const steps = t.interval === 'weekly' ? Math.floor((idx - anchor) / 7) : (idx - anchor);
  const n = ring.length;
  return ring[(((ptr + steps) % n) + n) % n];
}

// Een vaste taak = precies één (actieve) deelnemer → nooit echte rotatie (👤-marker).
function isFixedTask(t){
  const active = uid => membersCache[uid] && membersCache[uid].rol === 'kind' && membersCache[uid].actief !== false;
  const m = Array.isArray(t.members) ? t.members.filter(active) : [];
  return m.length === 1;
}

// Effectieve dagindex van een `onDay`-taak (een doorgeschoven beurt, zie shiftPostpone):
// zijn vaste dag, maar als die al voorbij is (een blijven-liggen beurt terwijl de klok
// doortikt) schuift hij mee naar vandaag i.p.v. te verdwijnen — zelfde zelf-herstel als de
// override van een beurt in shiftPendingDay. Puur lees-pad, geen write. `null` = ongeldig.
function onDayEffIdx(t){
  const od = parseDayKey(t.onDay);
  if (!od) return null;
  return Math.max(dayIndex(od), dayIndex(clampedToday()));
}

// De taken die kind `uid` op dag (idx, dow) toegewezen krijgt, op volgorde.
// `onDay` pint een taak op één exacte dag i.p.v. een weekdag-patroon (met het zelf-herstel
// hierboven); afwezig = het gewone weekdag-gedrag (schema-additief).
function tasksForKidDay(uid, idx, dow){
  return taskList().filter(t => {
    if (taskAssignee(t, idx) !== uid) return false;
    if (t.onDay){ const e = onDayEffIdx(t); return e != null && idx === e; }
    return taskWeekdays(t).includes(dow);
  });
}

// --- Migratie van de oude A/B-bucketvorm naar de platte rotatievorm ---
// Oude vorm: settings/tasks/{A|B|uid}/{taskId}. Nieuwe vorm: settings/tasks/{taskId}
// met members/pointer. A-bucket → pointer 0 (start bij het eerste kind), B → pointer 1
// (start bij het tweede), kind-uid-bucket → vaste taak (members:[uid]).
function looksLikeBuckets(v){
  return v && Object.values(v).some(x => x && typeof x === 'object' && !('label' in x)
    && Object.values(x).some(t => t && typeof t === 'object' && 'label' in t));
}
function migrateTaskBuckets(v){
  const out = {};
  Object.keys(v).forEach(bucket => {
    const tasks = v[bucket];
    if (!tasks || typeof tasks !== 'object') return;
    if ('label' in tasks){ out[bucket] = tasks; return; } // al een platte taak
    Object.keys(tasks).forEach(tid => {
      const t = tasks[tid];
      if (!t || typeof t !== 'object' || !('label' in t)) return;
      const rec = { label: t.label, recurring: t.recurring !== false, order: t.order || 0 };
      if (t.recurring === false) rec.recurring = false;
      if (Array.isArray(t.weekdays)) rec.weekdays = t.weekdays;
      if (bucket === 'A'){ rec.members = []; rec.pointer = 0; }
      else if (bucket === 'B'){ rec.members = []; rec.pointer = 1; }
      else { rec.members = [bucket]; } // kind-uid-bucket → vaste taak
      out[tid] = rec;
    });
  });
  return out;
}

// Bevroren eenmalige taken van deze dag (days/{key}/snap/{uid}/{taskId}) voor één
// kind. Zo'n snapshot wordt geschreven op het moment dat een eenmalige taak wordt
// afgevinkt (de definitie wordt dan uit settings/tasks verwijderd) — zonder snapshot
// zou de rij meteen verdwijnen i.p.v. afgevinkt te blijven staan. Genest per uid
// (§2.2) zodat de rules "alleen eigen snapshots" kunnen afdwingen.
function daySnapsFor(uid, state){
  const snap = (state.snap && state.snap[uid]) || {};
  return Object.keys(snap)
    .map(id => ({ id, ...snap[id] }))
    .sort((a,b) => (a.order||0) - (b.order||0));
}

// Afvinkstatus van één taak: days/{key}/checks/{uid}/{taskId} (§2.2-nesting).
function isChecked(uid, taskId){
  return !!(dayState.checks && dayState.checks[uid] && dayState.checks[uid][taskId]);
}

// --- Reeksen (streaks) & badges ---
// Datamodel: streaks/{kind}/days/{dagkey}: true  = die dag alles afgewerkt
//            streaks/{kind}/badges/{dagkey}: true = badge verdiend op die dag
// Een badge is voorgoed verdiend — hij wordt nooit automatisch verwijderd, ook
// niet als vinkjes later weer uitgaan. Welk ontwerp een badge krijgt, wordt bij
// het renderen afgeleid uit de chronologische volgorde (nooit opgeslagen), zodat
// een later teruggevonden oudere badge de nummering niet in de war stuurt.

// Aantal ingeplande taken (rol + vast) voor een kind op een dag. Benadering voor
// het verleden: gebruikt de húidige instellingen. Stofzuigen telt bewust niet mee
// — een doorgeschoven beurt mag een oude reeks niet achteraf breken.
function kidScheduledCount(kidKey, d){
  return tasksForKidDay(kidKey, dayIndex(d), d.getDay()).length;
}

// Loopt de hele historiek (START → vandaag) voorwaarts door de vlaggen en bepaalt:
//  count    – huidige reeks (dagen op rij, met jokerregel)
//  jokerUsed– is de joker van de lopende badge-cyclus al opgebruikt?
//  earnDays – élke dagkey waarop een badge verdiend werd (alle reeksen, ook oude)
// Regels: een dag zonder ingeplande taken telt niet mee én breekt niet; vandaag
// (nog niet voorbij) breekt nooit; één gemiste taakdag per cyclus wordt vergeven
// (de joker), een tweede breekt de reeks. De joker vernieuwt bij elke badge.
// Puur lees-pad (zoals pendingVacuumDay): elke render herrekent, schrijft niets.
// extraDayKey: een vlag die net geschreven wordt maar nog niet in de cache zit.
function simulateStreak(kidKey, extraDayKey){
  const flags = streaksOf(kidKey).days;
  const todayIdx = dayIndex(new Date());
  // pas vanaf de reeks-startdatum tellen — oudere dagen laten we volledig buiten de
  // walk, zodat oude /days-historiek nooit een reeks kan toekennen (zie streakStartKey)
  const fromIdx = streakStartIdx();
  let count = 0, jokerUsed = false;
  const earnDays = [];
  for (let i = fromIdx; i <= todayIdx; i++){
    const dd = new Date(START); dd.setDate(dd.getDate() + i);
    const key = dayKey(dd);
    if (flags[key] || key === extraDayKey){
      count++;
      if (count % 7 === 0){ earnDays.push(key); jokerUsed = false; }
    } else if (kidScheduledCount(kidKey, dd) === 0){
      // vrije dag: geen taken ingepland — telt niet, breekt niet
    } else if (i === todayIdx){
      // vandaag is nog bezig — niet-af betekent nog niets
    } else if (count === 0){
      // er loopt geen reeks — een gemiste dag heeft niets te breken en mag
      // ook de joker van een nog te beginnen reeks niet opsouperen
    } else if (!jokerUsed){
      jokerUsed = true; // joker: één gemiste dag per badge-cyclus wordt vergeven
    } else {
      count = 0; jokerUsed = false; // tweede misser: reeks gebroken, verse start
    }
  }
  return { count, jokerUsed, earnDays };
}

// Verdiende badges van een kind, op volgorde van hun volgnummer (b1, b2, …).
// De sleutel is bewust het volgnummer — NIET de verdiendag. De verdiendag is
// niet stabiel: wie een vergeten dag in het verleden alsnog afvinkt, verschuift
// de dag waarop de reeks een 7-veelvoud raakt, en met een dagkey-sleutel kwam er
// dan telkens een nieuwe badge bij terwijl de oude bleef staan → elke dag een
// badge i.p.v. om de 7. Met een volgnummer is het aantal badges = earnDays.length
// en groeit dat enkel als er écht 7 dagen bijkomen. De rang (= ontwerp-index)
// volgt uit het volgnummer; de waarde bewaart de verdiendag, enkel om te tonen.
function kidBadgeList(kidKey){
  const badges = streaksOf(kidKey).badges;
  return Object.keys(badges)
    .filter(k => /^b\d+$/.test(k))
    .map(k => ({ rank: parseInt(k.slice(1), 10) - 1, date: parseDayKey(badges[k]) }))
    .sort((a, b) => a.rank - b.rank);
}

// Aantal reeds opgeslagen badges (enkel de b<n>-sleutels tellen mee).
function badgeCountOf(kidKey){
  return Object.keys(streaksOf(kidKey).badges).filter(k => /^b\d+$/.test(k)).length;
}

// Rang (= ontwerp-index) van de badge die op deze dag verdiend werd, of null.
// Nodig zodat een tweede toestel — dat de voltooiing via de listener ziet i.p.v.
// zelf te schrijven — toch de juiste medaille in de viering kan tonen.
function badgeRankEarnedOn(kidKey, dayK){
  const badges = streaksOf(kidKey).badges;
  const hit = Object.keys(badges).find(k => /^b\d+$/.test(k) && badges[k] === dayK);
  return hit ? parseInt(hit.slice(1), 10) - 1 : null;
}

// Schrijft de voltooiingsvlag voor een dag, atomisch samen met eventuele nieuw
// verdiende badges (één multi-path update, zelfde conventie als het bevriezen van
// eenmalige taken). Het aantal badges = earnDays.length en groeit enkel; we vullen
// aan tot dat aantal met opeenvolgende b<n>-sleutels en verwijderen nooit iets, dus
// een verschoven verdiendag of een uitgevinkte dag kan geen dubbele badges geven.
// Geeft de rangen van de nieuw geschreven badges terug zodat de viering de juiste
// medaille kan tonen.
function writeCompletionFlag(kidKey, key){
  const sim = simulateStreak(kidKey, key);
  const have = badgeCountOf(kidKey);
  const want = sim.earnDays.length;
  const upd = { [`streaks/${kidKey}/days/${key}`]: true };
  const newRanks = [];
  for (let n = have + 1; n <= want; n++){
    upd[`streaks/${kidKey}/badges/b${n}`] = sim.earnDays[n - 1]; // waarde = verdiendag
    newRanks.push(n - 1);
  }
  rootUpdate(upd);
  return newRanks;
}

// --- Firebase: alle DB-listeners voor het gezin — pas gestart nadat een ouder
// is ingelogd (zie onAuthStateChanged hieronder). Vóór login is er geen
// databasetoegang nodig en mogen deze niet draaien. De unsubscribes worden
// bewaard zodat teardownFamily ze bij uitloggen weer kan afkoppelen.
let familyUnsubs = [];
function initFamily(){
  // --- taakinstellingen (leeft zolang de login) ---
  familyUnsubs.push(onValue(dbRef('settings/tasks'), snap => {
    if (!snap.exists()){
      set(dbRef('settings/tasks'), DEFAULT_TASKS);
      return; // wacht op de her-fire van deze listener met de echte data
    }
    loadError = null;
    const v = snap.val() || {};
    if (looksLikeBuckets(v)){
      // oude A/B-bucketvorm → platte rotatievorm. Altijd in-memory tonen zodat de
      // app meteen werkt; de persistente migratie doet maybeMigrateTasks zodra ook
      // members geladen is (een kind mag settings niet schrijven).
      tasksCache = migrateTaskBuckets(v);
      tasksLoaded = true;
      rawOldTasks = v;
      maybeMigrateTasks();
      render();
      return;
    }
    rawOldTasks = null;
    tasksCache = v;
    tasksLoaded = true;
    render();
  }, () => {
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  }));

  // --- beurt-taken (leeft zolang de login) ---
  // Zaait DEFAULT_SHIFTS zoals de andere settings/* — een fris gezin krijgt zo
  // meteen de "Stofzuigen"-beurt-taak (met lege deelnemers = alle actieve kinderen).
  familyUnsubs.push(onValue(dbRef('settings/shifts'), snap => {
    if (!snap.exists()){
      set(dbRef('settings/shifts'), DEFAULT_SHIFTS);
      return; // wacht op de her-fire van deze listener met de echte data
    }
    loadError = null;
    shiftsCache = snap.val() || {};
    vacuumLoaded = true;
    render();
  }, () => {
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  }));

  // --- reeksen & badges (leeft zolang de login) ---
  // Geen seeding zoals bij settings/*: een ontbrekende tak betekent gewoon "nog
  // niets verdiend" (zelfde behandeling als afwezige kind-buckets in tasks).
  familyUnsubs.push(onValue(dbRef('streaks'), snap => {
    loadError = null;
    const v = snap.val() || {};
    streaksCache = {};
    Object.keys(v).forEach(uid => {
      streaksCache[uid] = { days: v[uid].days || {}, badges: v[uid].badges || {} };
    });
    streaksLoaded = true;
    render();
  }, () => {
    // Streaks/badges zijn een extra laag bovenop de klusjes — een leesfout hier
    // (bv. een ontbrekende /streaks-regel) mag de kernapp nooit platleggen: toon
    // dan gewoon "nog geen badges" i.p.v. de app te laten vasthangen op "Laden…".
    streaksCache = {};
    streaksLoaded = true;
    render();
  }));

  // --- reeks-startdatum (instelbaar via Beheer) ---
  // Geen laad-gate: streakStartKey heeft altijd een geldige fallback (DEFAULT_STREAK_START),
  // dus de app hoeft hier nooit op te wachten en een leesfout kan niks platleggen.
  familyUnsubs.push(onValue(dbRef('settings/streakStart'), snap => {
    const v = snap.val();
    streakStartKey = (typeof v === 'string' && parseDayKey(v)) ? v : DEFAULT_STREAK_START;
    render();
  }, () => {}));

  // --- gezinsgegevens: meta (naam + gezinscode) ---
  // Geen seeding: de bootstrap bij het aanmaken schreef meta al; absent kan
  // praktisch niet, maar wordt als leeg behandeld i.p.v. te blijven hangen.
  familyUnsubs.push(onValue(dbRef('meta'), snap => {
    loadError = null;
    metaCache = snap.val() || null;
    metaLoaded = true;
    render();
  }, () => {
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  }));

  // --- gezinsleden (de kaarten + rotatie-ring bouwen hierop) ---
  familyUnsubs.push(onValue(dbRef('members'), snap => {
    loadError = null;
    membersCache = snap.val() || {};
    membersLoaded = true;
    maybeMigrateTasks(); // members is nu geladen → een uitgestelde taak-migratie kan alsnog
    render();
  }, () => {
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  }));

  attachDayListener(current);
}

// Schrijft de gemigreerde (platte) taken één keer weg zodra zowel de oude vorm
// gedetecteerd is (rawOldTasks) als members geladen is en de ingelogde gebruiker
// een ouder is. Wordt vanuit beide listeners aangeroepen; wie als tweede laadt,
// voert het uit. De set() her-vuurt de taken-listener met de nieuwe vorm.
function maybeMigrateTasks(){
  if (!rawOldTasks) return;
  if (!(authUser && membersCache[authUser.uid] && membersCache[authUser.uid].rol === 'ouder')) return;
  const migrated = migrateTaskBuckets(rawOldTasks);
  rawOldTasks = null;
  set(dbRef('settings/tasks'), migrated);
}

// Koppelt alle gezinslisteners af en zet de caches en laad-gates terug naar hun
// beginwaarden, zodat een volgende login (mogelijk een ander account/gezin) met
// een schone lei en verse listeners start. Nu al belangrijk voor een correcte
// her-login; vanaf fase 3 (DB_ROOT per gezin) onmisbaar.
function teardownFamily(){
  familyUnsubs.forEach(u => { try { u(); } catch (e) {} });
  familyUnsubs = [];
  if (dayUnsubscribe){ dayUnsubscribe(); dayUnsubscribe = null; }
  dayListenerToken++; // maakt eventuele in-flight dag-callbacks tot no-ops
  familyInited = false;
  familyResolving = false;
  familyId = null;
  DB_ROOT = BASE_ROOT; // terug naar de sandbox-basis, zodat een volgende bootstrap klopt
  tasksLoaded = vacuumLoaded = dayLoaded = streaksLoaded = false;
  metaCache = null; metaLoaded = false;
  membersCache = {}; membersLoaded = false;
  tasksCache = {};
  rawOldTasks = null;
  shiftsCache = {};
  streaksCache = {};
  dayState = {};
  streakStartKey = DEFAULT_STREAK_START;
  celebratedDays = new Set();
  loadError = null;
}

// Zet de gezins-scope en start de listeners. Aangeroepen door de login-resolutie
// (na het opzoeken van userIndex) én rechtstreeks door create/join (die de
// familyId meteen kennen). Vanaf hier wijst dbRef('settings/…') naar
// families/{familyId}/settings/… — alle bestaande paden verhuizen zo mee.
function startFamily(fid){
  familyId = fid;
  DB_ROOT = BASE_ROOT + 'families/' + fid + '/';
  familyInited = true;
  familyResolving = false;
  initFamily();
}

// Login-resolutie: zoek het gezin van deze gebruiker op via userIndex/{uid} en
// start het. Een account zonder gezin (bv. een aanmaak die na de accountstap is
// afgebroken) wordt netjes uitgelogd met een uitleg, i.p.v. de app op een
// onbekende scope te laten draaien.
async function resolveFamilyAndInit(user){
  familyResolving = true;
  try {
    const idx = await get(baseRef('userIndex/' + user.uid));
    const fid = idx.exists() ? idx.val() : null;
    if (!fid){
      familyResolving = false;
      pendingAuthError = 'Dit account hoort nog niet bij een gezin. Maak er een aan of sluit aan met een gezinscode.';
      pendingAuthMode = 'login';
      await signOut(auth);
      return;
    }
    startFamily(fid);
    render();
  } catch (e){
    familyResolving = false;
    loadError = 'Kon het gezin niet laden. Probeer de app opnieuw te openen.';
    render();
  }
}

// --- Firebase: aanmelding — start/stop de gezinslisteners op basis van de
// inlogstatus. Bij een gewone login zoeken we het gezin op via userIndex en
// starten we de listeners; create/join starten zelf (ze kennen de familyId al en
// hebben userIndex mogelijk net pas geschreven). Uitloggen koppelt alles af via
// teardownFamily, zodat her-inloggen (mogelijk een ander gezin) vers begint.
onAuthStateChanged(auth, user => {
  authUser = user;
  authLoaded = true;
  if (user){
    // 'login' (ouder) en 'kid' (kind) zijn allebei gewone aanmeldingen: scherm
    // wisselen en het gezin opzoeken via userIndex. Bij 'create'/'join' doet de
    // flow zelf startFamily ná zijn schrijf — daar hier niets doen.
    if (authMode === 'login' || authMode === 'kid'){
      authError = null;
      authBusy = false;
      if (screen === 'auth') screen = 'day';
      // resolutie pas starten als er nog geen gezin loopt of wordt opgezocht
      if (!familyInited && !familyResolving) resolveFamilyAndInit(user);
    }
  } else {
    authBusy = false;
    // pending-waarden (gezet vlak vóór een signOut in de create/join-flows of de
    // gestrand-account-afhandeling) overnemen i.p.v. wissen — zie pendingAuthError.
    authError = pendingAuthError;
    authMode = pendingAuthMode || 'login';
    pendingAuthError = null;
    pendingAuthMode = null;
    screen = 'auth';
    teardownFamily();
  }
  render();
});

// --- Firebase: dagstatus (opnieuw aangesloten bij elke dagwissel) ---
function attachDayListener(d){
  if (dayUnsubscribe){ dayUnsubscribe(); dayUnsubscribe = null; }
  const capturedKey = dayKey(d);
  const myToken = ++dayListenerToken;
  dayLoaded = false;
  dayState = {};
  dayUnsubscribe = onValue(dbRef(`days/${capturedKey}`), snap => {
    if (myToken !== dayListenerToken) return; // laat antwoord voor een inmiddels vervangen listener: negeren
    loadError = null;
    dayState = snap.val() || {};
    dayLoaded = true;
    render();
  }, () => {
    if (myToken !== dayListenerToken) return;
    loadError = 'Geen verbinding met de database. Probeer de app opnieuw te openen.';
    render();
  });
}

function render(){
  if (screen === 'auth'){
    if (!authLoaded){
      document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
      return;
    }
    renderAuth();
    return;
  }

  if (loadError){
    document.getElementById('app').innerHTML = `<div class="loading">${escapeHtml(loadError)}</div>`;
    return;
  }

  // kinderen mogen niet in beheer-schermen belanden, ook niet via een oude state
  if (isChild() && (screen === 'admin' || screen === 'members')){
    screen = 'day';
  }

  if (screen === 'admin'){
    if (!tasksLoaded || !vacuumLoaded || !membersLoaded){
      document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
      return;
    }
    renderAdmin();
    return;
  }

  if (screen === 'badges'){
    // taken + leden zijn nodig omdat simulateStreak vrije dagen herkent via het
    // taakschema en de kaarten uit de ledenlijst komen
    if (!streaksLoaded || !tasksLoaded || !membersLoaded){
      document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
      return;
    }
    renderBadges();
    return;
  }

  if (screen === 'members'){
    if (!metaLoaded || !membersLoaded){
      document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
      return;
    }
    renderMembers();
    return;
  }

  if (!tasksLoaded || !dayLoaded || !vacuumLoaded || !streaksLoaded || !membersLoaded){
    document.getElementById('app').innerHTML = '<div class="loading">Laden…</div>';
    return;
  }

  // Gepauzeerd kind: vriendelijk blokkeren i.p.v. een lege of verkeerde weergave.
  if (isChild() && membersCache[authUser.uid].actief === false){
    document.getElementById('app').innerHTML = `
      <div class="auth-screen"><div class="auth-card">
        <div class="celebration-emoji">⏸️</div>
        <div class="auth-title">Even gepauzeerd</div>
        <div class="auth-sub">Je account staat op pauze. Vraag het aan mama of papa.</div>
        <button class="pw-cancel" style="width:100%;padding:11px 0;border-radius:12px;font-weight:600;" onclick="logout()">Uitloggen</button>
      </div></div>`;
    return;
  }

  const idx = dayIndex(current);
  const dow = current.getDay();
  const state = dayState;

  // Kaarten = actieve kind-leden (uid-gesleuteld). Een ingelogd kind ziet enkel
  // zijn eigen kaart; een ouder ziet iedereen.
  const kids = activeKids()
    .filter(k => !isChild() || k.uid === authUser.uid)
    .map(k => ({
      key: k.uid, name: k.name, kleur: k.kleur,
      // de taken die dit kind vandaag toegewezen krijgt (rotatie + vaste taken door
      // elkaar, op volgorde); vaste taken (één deelnemer) krijgen de 👤-marker
      tasks: tasksForKidDay(k.uid, idx, dow).map(t => ({ ...t, fixed: isFixedTask(t) }))
    }));

  const isToday = dayIndex(current) === dayIndex(new Date());
  const cDay = dayKey(current);
  let allTasks = [];
  let doneCount = 0;
  const newlyDone = []; // kinderen die déze render al hun klusjes af kregen
  kids.forEach(k => {
    // bevroren eenmalige taken van deze dag die niet (meer) in de levende lijst zitten
    k.snaps = daySnapsFor(k.key, state).filter(s => !k.tasks.some(t => t.id === s.id));
    // beurt-taken waarvan dit kind vandaag aan de beurt is
    k.shifts = shiftsForKid(k.key);
    const ids = k.tasks.map(t => t.id).concat(k.snaps.map(s => s.id));
    // een projectie (vooruitblik) telt niet mee voor de voltooiing van de dag
    k.shifts.forEach(({ sh, info }) => { if (info.mode !== 'projected') ids.push('shift-' + sh.id); });
    allTasks = allTasks.concat(ids);

    const kidDone = ids.filter(id => isChecked(k.key, id)).length;
    doneCount += kidDone;

    // Voltooiingsvlag voor de reeks bijhouden. Bewust een schrijf op het lees-pad,
    // maar strak bewaakt: idempotent (vaste sleutel, waarde true) en alleen bij een
    // échte overgang — een aanwezige vlag wordt nooit herschreven, dus de her-render
    // via de streaks-listener kan geen schrijf-lus starten. Op een dag in het
    // verleden alleen toevoegen (een ouder die een vergeten vinkje herstelt, of
    // historiek van vóór deze feature, repareert zo de reeks); alleen op vandaag
    // ook weer weghalen — later toegevoegde taken mogen oude dagen niet achteraf
    // "onaf" maken. Toekomstige dagen krijgen nooit een vlag (vooruit klikken mag
    // de reeks niet kunnen foppen). Een ingelogd KIND schrijft dit enkel voor
    // zichzelf: zijn kids-lijst bevat alleen de eigen kaart, dus k.key===auth.uid
    // — precies wat de streaks-rule vereist (sibling-writes zouden geweigerd worden).
    const complete = ids.length > 0 && kidDone === ids.length;
    // enkel dagen vanaf de reeks-startdatum krijgen/verliezen een voltooiingsvlag —
    // oudere dagen blijven buiten de reeks, hoe vaak je er ook naartoe terugbladert
    if (dayIndex(current) >= streakStartIdx() && dayIndex(current) <= dayIndex(new Date())){
      const flagged = !!streaksOf(k.key).days[cDay];
      if (complete && !flagged){
        k.newBadges = writeCompletionFlag(k.key, cDay);
      } else if (!complete && flagged && isToday && ids.length > 0){
        remove(dbRef(`streaks/${k.key}/days/${cDay}`));
      }
    }

    // Reeks voor de streak-strook; mét de eventueel net geschreven vlag, zodat de
    // strook niet één render lang achterloopt op de write hierboven.
    k.streak = simulateStreak(k.key, complete ? cDay : undefined);

    // De proficiat-viering hoort enkel op de dag zelf (vandaag) — nooit terugbladeren
    // naar een oude, al afgewerkte dag opnieuw laten vieren.
    if (!isToday) return;
    const gKey = `${cDay}:${k.key}`;
    if (ids.length > 0 && kidDone === ids.length){
      if (!celebratedDays.has(gKey)){
        celebratedDays.add(gKey);
        // badge van vandaag erbij: net geschreven op dit toestel (de teruggegeven
        // rangen), of — op een ander toestel dat de voltooiing via de listener ziet
        // — de badge waarvan de verdiendag vandaag is
        const newRank = (k.newBadges && k.newBadges.length)
          ? k.newBadges[k.newBadges.length - 1]
          : badgeRankEarnedOn(k.key, cDay);
        newlyDone.push({ name: k.name, kid: k.key, badgeRank: newRank });
      }
    } else if (kidDone < ids.length){
      // alleen herwapenen bij écht onafgewerkt werk — een tijdelijk lege id-lijst
      // (listener-race rond het bevriezen van een eenmalige taak: definitie al weg,
      // snapshot nog niet binnen) mag de guard niet wissen, anders viert de
      // volgende render dezelfde voltooiing een tweede keer
      celebratedDays.delete(gKey);
    }
  });
  const pct = allTasks.length ? Math.round((doneCount / allTasks.length) * 100) : 0;

  const app = document.getElementById('app');
  app.innerHTML = `
    ${isToday ? '' : `<div class="today-row"><button class="today-btn" onclick="goToday()">Ga naar vandaag</button></div>`}
    <div class="nav">
      <button onclick="changeDay(-1)">‹</button>
      <div class="date">
        <div class="weekday">${WD[current.getDay()]}</div>
        <div class="fulldate">${current.getDate()} ${MN[current.getMonth()]}</div>
      </div>
      <button onclick="changeDay(1)">›</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Voortgang</span><span>${doneCount}/${allTasks.length}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    ${kids.map(k => renderCard(k)).join('')}
    ${kids.length === 0 ? '<div class="card"><div class="loading" style="padding:20px;">Nog geen kinderen in het gezin.<br>Voeg ze toe via 👨‍👩‍👧 Gezin hieronder.</div></div>' : ''}

    <div class="footer-row">
      <div class="footer-btns">
        <button class="admin-link" onclick="openBadges()">🏆 Badges</button>
        ${isChild() ? '' : `<button class="admin-link" onclick="openMembers()">👨‍👩‍👧 Gezin</button>
        <button class="admin-link" onclick="openAdmin()">⚙️ Beheer</button>`}
      </div>
      ${versionLine()}
    </div>
  `;

  if (newlyDone.length) showCelebration(newlyDone);
}

function renderCard(k){
  const tasks = k.tasks.map(t =>
    // een doorgeschoven beurt (fromShift) is een beurt-rij die verschuifbaar blijft,
    // geen gewone persoonlijke taak
    t.fromShift
      ? owedShiftRow(k.key, t)
      : taskRow(k.key, t.id, t.label, isChecked(k.key, t.id), t.fixed)
  ).concat((k.snaps || []).map(s =>
    // bevroren eenmalige taak: blijft afgevinkt zichtbaar; terug aanklikken herstelt ze
    s.fromShift
      ? owedShiftRow(k.key, s)
      : taskRow(k.key, s.id, s.label, isChecked(k.key, s.id), isFixedTask(s))
  )).join('');

  const shiftRows = (k.shifts || []).map(({ sh, info }) => shiftRow(k.key, sh, info)).join('');

  // kleuren komen uit het ledenrecord (hex); de kaart-tint is dezelfde kleur met
  // lage dekking zodat hij in licht én donker thema leesbaar blijft
  return `
    <div class="card">
      <div class="card-header">
        <div class="dot" style="background:${k.kleur}"></div>
        <div class="name">${escapeHtml(k.name)}</div>
      </div>
      ${streakStrip(k)}
      ${tasks}
      ${shiftRows}
    </div>
  `;
}

// Compacte reeks-strook op de kind-kaart: vlam + aantal dagen op rij, zeven
// bolletjes die vollopen richting de volgende badge, de joker (❤️ = nog één
// gemiste dag wordt vergeven, 💔 = joker deze cyclus al gebruikt) en het aantal
// verdiende badges. Bewust beeldtaal, nauwelijks tekst. Tikken opent de galerij.
function streakStrip(k){
  const st = k.streak || simulateStreak(k.key);
  const filled = st.count === 0 ? 0 : ((st.count - 1) % 7) + 1; // op badge-dag: 7/7 vol
  const nBadges = badgeCountOf(k.key);
  const dots = [0,1,2,3,4,5,6].map(i => `<span class="sdot${i < filled ? ' on' : ''}"></span>`).join('');
  return `
    <button class="streak-strip" onclick="openBadges('${k.key}')" title="Bekijk de badges van ${escapeHtml(k.name)}">
      <span class="streak-flame${st.count ? '' : ' off'}">🔥 ${st.count}</span>
      <span class="streak-dots">${dots}</span>
      <span class="streak-joker" title="Joker: één gemiste dag per badge wordt vergeven">${st.jokerUsed ? '💔' : '❤️'}</span>
      <span class="streak-chip">🏆 ${nBadges}</span>
    </button>
  `;
}

function taskRow(uid, taskId, label, done, fixed){
  return `
    <div class="task" onclick="toggleTask('${uid}','${taskId}')">
      <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-label ${done ? 'done' : ''}">${escapeHtml(label)}</div>
      ${fixed ? '<span class="fixed-mark" title="Vaste taak">👤</span>' : ''}
    </div>
  `;
}

// Rij voor een DOORGESCHOVEN beurt: opgeslagen als eenmalige taak (recurring:false +
// fromShift + onDay, zie shiftPostpone), maar getekend als een beurt die — anders dan een
// gewone persoonlijke taak — verschuifbaar blijft. Afvinken loopt via toggleTask (bevriezen
// + definitie weg). De ⏮/⏭-knoppen zijn ouder-only en herschikken enkel de onDay-dag;
// ⏮ verdwijnt zodra de beurt al op vandaag staat (eerder dan vandaag kan niet).
function owedShiftRow(uid, t){
  const done = isChecked(uid, t.id);
  let buttons = '';
  if (!done && !isChild()){
    const eff = onDayEffIdx(t);
    const todayIdx = dayIndex(clampedToday());
    // ⏮ een dag eerder — enkel als de beurt in de toekomst staat (vóór vandaag kan niet)
    if (eff != null && eff > todayIdx){
      buttons += `<button class="postpone-btn" onclick="event.stopPropagation();moveOwedShift('${t.id}',-1)" title="Een dag eerder">${SKIP_BACK_ICON}</button>`;
    }
    buttons += `<button class="postpone-btn" onclick="event.stopPropagation();moveOwedShift('${t.id}',1)" title="Doorschuiven naar de volgende dag">${SKIP_FWD_ICON}</button>`;
  }
  return `
    <div class="task" onclick="toggleTask('${uid}','${t.id}')">
      <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-label ${done ? 'done' : ''}">${escapeHtml(t.label)}<span class="vac-tag">beurt</span></div>
      ${buttons}
    </div>
  `;
}

// Eén beurt-rij op de kaart. Aan/afvinken kan door het kind zelf én de ouder (de
// rules laten checks/{uid}, days/{key}/shift en de shift-pointer door leden schrijven).
// De verplaatsknoppen (⏮/📥/⏭) zijn ouder-only — dat is roosterbeheer.
function shiftRow(kidKey, sh, info){
  const done = isChecked(kidKey, 'shift-' + sh.id);
  const label = `🔁 ${escapeHtml(sh.name || 'Beurt')}: ${escapeHtml(info.line)}`;
  if (info.mode === 'projected'){
    // wél aanklikbaar: vooruitwerken (of een blijven-liggen-beurt door een ouder
    // laten vervallen) moet kunnen — zie de projected-tak in toggleShift
    return `
    <div class="task projected" onclick="toggleShift('${sh.id}','${kidKey}')">
      <div class="check"></div>
      <div class="task-label">${label}<span class="vac-tag">verwacht</span></div>
    </div>
  `;
  }
  let buttons = '';
  if (!done && info.lineIdx != null && !isChild()){
    const todayIdx = dayIndex(clampedToday());
    const pKey = shiftPendingDay(sh);
    const pIdx = pKey ? dayIndex(parseDayKey(pKey)) : null;
    if (info.mode === 'pending'){
      // drietal: vorige dag, naar vandaag, volgende dag — de eerste twee alleen
      // als de beurt in de toekomst staat (eerder dan vandaag kan niet)
      if (pIdx != null && pIdx > todayIdx){
        buttons += `<button class="postpone-btn" onclick="event.stopPropagation();shiftPrepone('${sh.id}')" title="Een dag eerder">${SKIP_BACK_ICON}</button>`;
        buttons += `<button class="postpone-btn" onclick="event.stopPropagation();shiftPull('${sh.id}','${info.uid}',${info.lineIdx},null)" title="Haal deze beurt naar vandaag">📥</button>`;
      }
      buttons += `<button class="postpone-btn" onclick="event.stopPropagation();shiftPostpone('${sh.id}')" title="Doorschuiven naar de volgende dag">${SKIP_FWD_ICON}</button>`;
    } else if (info.mode === 'done' && dayIndex(current) < todayIdx){
      // bij een snapshot-rij ('done') moet de momentopname mee verhuizen, anders
      // blijft de beurt dubbel staan — vandaar de dag-key als vierde argument
      buttons += `<button class="postpone-btn" onclick="event.stopPropagation();shiftPull('${sh.id}','${info.uid}',${info.lineIdx},'${dayKey(current)}')" title="Haal deze beurt naar vandaag">📥</button>`;
    }
  }
  return `
    <div class="task" onclick="toggleShift('${sh.id}','${kidKey}')">
      <div class="check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      <div class="task-label ${done ? 'done' : ''}">${label}<span class="vac-tag">beurt</span></div>
      ${buttons}
    </div>
  `;
}

// Haalt een beurt naar vandaag: de combo van de aangeklikte rij wordt de pointer,
// zodat de rotatie daarna gewoon vanaf die beurt verdergaat.
function shiftPull(shiftId, uid, lineIdx, fromKey){
  const sh = shiftsCache[shiftId]; if (!sh) return;
  const len = shiftLines({ ...sh }).length;
  update(dbRef('settings/shifts/' + shiftId), {
    override: dayKey(clampedToday()),
    next: { uid, lineIdx: ((lineIdx % len) + len) % len }
  });
  if (fromKey) remove(dbRef(`days/${fromKey}/shift/${shiftId}`));
}

// Zet de openstaande beurt één dag vroeger, maar nooit vroeger dan vandaag.
function shiftPrepone(shiftId){
  const sh = shiftsArray().find(s => s.id === shiftId);
  const pKey = sh && shiftPendingDay(sh);
  const n = sh && shiftEffectiveNext(sh);
  if (!pKey || !n) return;
  const nd = parseDayKey(pKey);
  nd.setDate(nd.getDate() - 1);
  if (dayIndex(nd) < dayIndex(clampedToday())) return;
  update(dbRef('settings/shifts/' + shiftId), { override: dayKey(nd), next: { uid: n.uid, lineIdx: n.lineIdx } });
}

// Doorschuiven (⏭): de openstaande beurt wordt LOSGEMAAKT tot een gewone eenmalige
// taak op de volgende dag (voor dezelfde persoon + lijn), en de rotatie schuift meteen
// door naar de volgende persoon. Zo blijft de beurt-taak draaien i.p.v. stil te staan
// tot déze ene beurt is afgevinkt (het oude gedrag verzette enkel de override-datum,
// waardoor dezelfde persoon aan de beurt bleef en de rotatie bevroor). De losse taak is
// een `recurring:false`-taak — dat hergebruikt het bestaande afvink/bevries/herstel-
// mechanisme (en de rules laten een kind zo'n taak al afvinken) — met `onDay` (enkel
// zichtbaar op die exacte dag) en `fromShift` (zodat Beheer ze verbergt). Ouder-only:
// de ⏭-knop is al `!isChild()`, dus de settings/tasks-schrijf mag.
function shiftPostpone(shiftId){
  const sh = shiftsArray().find(s => s.id === shiftId);
  const pKey = sh && shiftPendingDay(sh);
  const n = sh && shiftEffectiveNext(sh);
  if (!pKey || !n) return;
  const nd = parseDayKey(pKey);
  nd.setDate(nd.getDate() + 1);
  const line = shiftLines(sh)[n.lineIdx];
  const taskId = push(dbRef('settings/tasks')).key;
  rootUpdate({
    ['settings/tasks/' + taskId]: {
      label: `🔁 ${sh.name || 'Beurt'}: ${line}`,
      recurring: false,
      members: [n.uid],
      onDay: dayKey(nd),
      fromShift: shiftId,
      order: Date.now()
    },
    ['settings/shifts/' + shiftId + '/next']: shiftAdvance(sh, { uid: n.uid, lineIdx: n.lineIdx }, 1),
    ['settings/shifts/' + shiftId + '/override']: null
  });
}

// Een al doorgeschoven beurt (onDay-taak) nóg verder verschuiven: één dag terug (⏮) of
// vooruit (⏭), nooit vóór vandaag. Rekent vanaf de effectieve dag (self-heal), zodat een
// blijven-liggen beurt vanaf vandaag verder schuift. Ouder-only settings-schrijf (de
// knoppen zijn al !isChild()); enkel de onDay-dag wijzigt.
function moveOwedShift(taskId, delta){
  if (isChild()) return;
  const t = tasksCache[taskId];
  if (!t || !t.onDay) return;
  const eff = onDayEffIdx(t);
  if (eff == null) return;
  const todayIdx = dayIndex(clampedToday());
  let target = eff + delta;
  if (target < todayIdx) target = todayIdx;
  const nd = new Date(START); nd.setDate(nd.getDate() + target);
  set(dbRef('settings/tasks/' + taskId + '/onDay'), dayKey(nd));
}

// Beurt aan/afvinken. Mag door het kind zelf (rules: eigen checks + shift-pointer +
// bevroren days/{key}/shift zijn lid-schrijfbaar). Het afvinken schuift de pointer
// één stap door en bevriest de historiek; uitvinken draait dat terug.
function toggleShift(shiftId, kidKey){
  const sh = shiftsArray().find(s => s.id === shiftId);
  if (!sh) return;
  const info = shiftForDay(sh, current);
  if (!info || info.uid !== kidKey) return;
  // een kind mag enkel zijn eigen beurt afvinken
  if (isChild() && kidKey !== authUser.uid) return;
  const key = dayKey(current);
  const checkId = 'shift-' + shiftId;
  const newVal = !isChecked(kidKey, checkId);
  if (info.mode === 'projected' && !newVal) return; // kan niet: projectie is onaangevinkt
  if (newVal) playChime();
  set(dbRef(`days/${key}/checks/${kidKey}/${checkId}`), newVal);
  if (newVal){
    // historiek bevriezen: wie het was en welke lijn, los van latere instellingen
    set(dbRef(`days/${key}/shift/${shiftId}`), { uid: info.uid, line: info.line });
    if (info.mode === 'pending' || info.mode === 'projected'){
      // beurt afgewerkt: pointer één stap voorbij déze combo, override opgebruikt.
      // Bij een projectie vervalt een nog openstaande eerdere beurt stilzwijgend —
      // bewust: "de kids deden het niet, een ouder nam het over" mag niet blokkeren.
      update(dbRef('settings/shifts/' + shiftId), {
        next: shiftAdvance(sh, { uid: info.uid, lineIdx: info.lineIdx }, 1),
        override: null,
        lastDone: key
      });
    }
  } else if (sh.lastDone === key && sh.next){
    // het NET-afgevinkte ongedaan maken: momentopname weg, pointer terug, en de
    // beurt keert terug naar déze dag (afvinken wiste de override; zonder dit
    // herstel zou een verplaatste beurt terugspringen naar de volgende geplande dag
    // en lijken te verdwijnen). shiftForDay toont ze daarna weer als 'pending'.
    remove(dbRef(`days/${key}/shift/${shiftId}`));
    update(dbRef('settings/shifts/' + shiftId), { next: shiftAdvance(sh, sh.next, -1), lastDone: null, override: key });
  }
  // Een OUDERE bevroren beurt (niet de laatst-gedane) uitvinken: de momentopname
  // LATEN staan, zodat de rij zichtbaar en her-aanvinkbaar blijft (het vinkje staat
  // nu op false). Zonder de legacy-formule zou weghalen de rij anders doen verdwijnen.
}

function toggleTask(uid, taskId){
  const newVal = !isChecked(uid, taskId);
  const key = dayKey(current);
  const frozenSnap = dayState.snap && dayState.snap[uid] && dayState.snap[uid][taskId];

  // volledige rotatie-eigenschappen bewaren zodat een eenmalige taak exact hersteld
  // kan worden (label/weekdays/deelnemers/interval/anker/pointer)
  const copyRotation = (from, to) => {
    if (Array.isArray(from.weekdays)) to.weekdays = from.weekdays;
    if (Array.isArray(from.members)) to.members = from.members;
    if (from.interval) to.interval = from.interval;
    if (Number.isInteger(from.anchorIdx)) to.anchorIdx = from.anchorIdx;
    if (Number.isInteger(from.pointer)) to.pointer = from.pointer;
    if (from.onDay) to.onDay = from.onDay;         // exacte-dag-pinning (doorgeschoven beurt)
    if (from.fromShift) to.fromShift = from.fromShift; // herkomst-vlag (verborgen in Beheer)
    return to;
  };

  if (newVal){
    const task = tasksCache[taskId];
    if (!task && !frozenSnap){
      // rij bestaat niet meer (bv. net in een andere sessie verwijderd): geen
      // wees-vinkje schrijven voor iets dat de volgende render toch verdwijnt
      return;
    }
    playChime();
    if (task && task.recurring === false){
      // bevriezen in de dag + definitie verwijderen + afvinken, atomisch in één
      // multi-path update. Een kind mag dit van de rules óók: eigen checks/snap +
      // het verwijderen van een eenmalige taakdefinitie (recurring===false) onder
      // settings/tasks/{taskId} is de expliciete kind-uitzondering — die klopt nu
      // exact omdat de taak plat op settings/tasks/{taskId} staat (geen bucket meer).
      const snap = copyRotation(task, { label: task.label, order: task.order || 0 });
      rootUpdate({
        [`days/${key}/checks/${uid}/${taskId}`]: true,
        [`days/${key}/snap/${uid}/${taskId}`]: snap,
        [`settings/tasks/${taskId}`]: null
      });
    } else {
      set(dbRef(`days/${key}/checks/${uid}/${taskId}`), true);
    }
  } else {
    // uitvinken van een bevroren eenmalige taak: definitie herstellen uit de
    // snapshot, atomisch samen met het uitvinken en het opruimen van de snapshot.
    // Ouder-only: het terugzetten van de definitie is een settings-schrijf die de
    // rules een kind niet toestaan — de kind-UI legt dat vriendelijk uit.
    if (frozenSnap){
      if (isChild()){
        alert('Oeps — een eenmalige taak terugzetten kan alleen een ouder. Vraag het even.');
        return;
      }
      const rec = copyRotation(frozenSnap, { label: frozenSnap.label, recurring: false, order: frozenSnap.order || 0 });
      rootUpdate({
        [`days/${key}/checks/${uid}/${taskId}`]: false,
        [`days/${key}/snap/${uid}/${taskId}`]: null,
        [`settings/tasks/${taskId}`]: rec
      });
    } else {
      set(dbRef(`days/${key}/checks/${uid}/${taskId}`), false);
    }
  }
}

function changeDay(delta){
  const next = new Date(current);
  next.setDate(next.getDate() + delta);
  const idx = dayIndex(next);
  if (idx < 0) return; // vóór de startdatum kan niet; naar de toekomst is onbeperkt
  current = next;
  attachDayListener(current);
  render();
}

function goToday(){
  let today = new Date();
  if (dayIndex(today) < 0) today = new Date(START);
  current = today;
  attachDayListener(current);
  render();
}

// Geluid: gesynthetiseerd via Web Audio (geen extern geluidsbestand — de app moet
// één zelfstandig bestand blijven). De AudioContext wordt lazy aangemaakt binnen de
// klik zelf, wat op iOS vereist is om geluid te mogen spelen. Alle audio zit in
// try/catch: geluid is nice-to-have en mag nooit een state-write of popup blokkeren.
let audioCtx = null;
let lastChimeAt = 0;

// één toon met zachte fade-in/uit — abrupte starts/stops zijn precies wat tikken/kraken geeft
function tone(t0, freq, start, dur, vol, type){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, t0 + start);
  gain.gain.exponentialRampToValueAtTime(vol, t0 + start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + start + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0 + start);
  osc.stop(t0 + start + dur + 0.05);
}

// Kort belletje bij het afvinken: twee zachte sinustonen, een vriendelijk "ding-ding".
function playChime(){
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    lastChimeAt = Date.now();
    const t0 = audioCtx.currentTime;
    tone(t0, 880,     0,    0.45, 0.2, 'sine');
    tone(t0, 1174.66, 0.07, 0.45, 0.2, 'sine');
  } catch (e) {
    // zie audio-opmerking hierboven
  }
}

// Vrolijke "ta-da-da-daaa!"-fanfare bij de proficiat-popup: stijgende do-mi-sol
// gevolgd door een gedragen C-majeurakkoord met een sprankeltje erbovenop.
// Zuivere toonsynthese — geen ruis, die kraakt op telefoonspeakers.
function playFanfare(){
  try {
    if (!audioCtx) return; // nog geen enkele tik deze sessie (bv. vers geopende afgewerkte dag): stil
    if (audioCtx.state !== 'running'){
      // net getikt maar de (iOS-)resume is nog async onderweg: toch inplannen, hij
      // start zodra de context loopt. Zónder recente tik overslaan — anders zou een
      // opgespaarde fanfare bij de eerstvolgende tik plots alsnog afgaan.
      if (Date.now() - lastChimeAt > 3000) return;
      audioCtx.resume();
    }
    const t0 = audioCtx.currentTime;
    tone(t0, 523.25, 0,    0.20, 0.22); // C5  ta-
    tone(t0, 659.25, 0.12, 0.20, 0.22); // E5  da-
    tone(t0, 783.99, 0.24, 0.20, 0.22); // G5  da-
    tone(t0, 1046.5, 0.36, 1.10, 0.26); // C6  daaa! (slotakkoord)
    tone(t0, 1318.5, 0.36, 1.10, 0.16); // E6
    tone(t0, 783.99, 0.36, 1.10, 0.14); // G5
    tone(t0, 2093.0, 0.46, 0.90, 0.07, 'sine'); // sprankel (C7)
  } catch (e) {
    // zie audio-opmerking hierboven
  }
}

function showCelebration(entries){
  // per kind gevierd; als beide kinderen in dezelfde render klaar zijn (bv. bij het

  // entries: [{ name, kid, badgeRank }] — badgeRank gezet als deze voltooiing ook

// badgesFilter bepaalt wiens badges getoond worden: een kind-key (via de streak-

// beide kinderen. Elke openBadges-aanroep zet de filter opnieuw, dus een oude

let badgesFilter = null;
function openBadges(kidKey){

  document.getElementById('app').innerHTML = `

function renderBadgeSection(kidKey, name, color){
  const earned = kidBadgeList(kidKey);
  const st = simulateStreak(kidKey);
  const filled = st.count === 0 ? 0 : ((st.count - 1) % 7) + 1;
  const toGo = 7 - (filled % 7); // 7/7 vol = badge net binnen, dus weer 7 tot de volgende
  const todayKey = dayKey(new Date());

  const earnedCards = earned.map(b => {
    const design = badgeDesign(b.rank);
    const isNew = b.date && dayKey(b.date) === todayKey;
    return `
      <div class="badge-card${isNew ? ' new' : ''}" style="--bc1:${design.c1};--bc2:${design.c2}">
        ${badgeSVG(design, 92)}
        <div class="badge-name">${design.name}${design.level > 1 ? ` <span class="badge-level">${roman(design.level)}</span>` : ''}</div>
        <div class="badge-date">${b.date ? `${b.date.getDate()} ${MN[b.date.getMonth()]}` : ''}</div>
      </div>
    `;
  }).join('');

  // de eerstvolgende (te verdienen) ontwerpen, vergrijsd — er is altijd iets om
  // naartoe te werken; enkel de eerste toont hoeveel dagen er nog te gaan zijn
  const lockedCards = [0,1,2].map(i => {
    const design = badgeDesign(earned.length + i);
    return `
      <div class="badge-card locked">
        ${badgeSVG(design, 92)}
        <div class="badge-name">${design.name}${design.level > 1 ? ` <span class="badge-level">${roman(design.level)}</span>` : ''}</div>
        <div class="badge-date">${i === 0 ? `nog ${toGo} ${toGo === 1 ? 'dag' : 'dagen'}` : '7 dagen op rij'}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="admin-section">
      <div class="card-header">
        <div class="dot" style="background:${color}"></div>
        <div class="name">${escapeHtml(name)}</div>
        <div class="role-badge" style="color:${color};background:var(--track)">🔥 ${st.count}</div>
      </div>
      <div class="badge-grid">
        ${earnedCards}
        ${lockedCards}
      </div>
    </div>
  `;
}

// --- Aanmelden (auth) ---
// Startscherm vóór elke andere schermweergave: pas na een geslaagde ouder-login
// (onAuthStateChanged) start de rest van de app zijn databasetoegang.
function authErrorMessage(code){
  switch (code){
    case 'auth/invalid-email': return 'Ongeldig e-mailadres.';
    case 'auth/user-not-found':
    case 'auth/wrong-password':
    case 'auth/invalid-credential': return 'E-mailadres of wachtwoord onjuist.';
    // surfacet enkel nog wanneer het bestaande account een ánder wachtwoord heeft
    // (ensureAccount vangt het geval "zelfde gegevens" al op door in te loggen)
    case 'auth/email-already-in-use': return 'Dit e-mailadres is al in gebruik met een ander wachtwoord.';
    case 'auth/weak-password': return 'Wachtwoord moet minstens 6 tekens lang zijn.';
    case 'auth/too-many-requests': return 'Te veel pogingen. Probeer het later opnieuw.';
    case 'auth/network-request-failed': return 'Geen internetverbinding.';
    default: return 'Er ging iets mis. Probeer het opnieuw.';
  }
}

function submitLogin(){
  const emailInp = document.getElementById('authEmail');
  const pwInp = document.getElementById('authPw');
  const email = emailInp ? emailInp.value.trim() : '';
  const pw = pwInp ? pwInp.value : '';
  if (!email || !pw){
    authError = 'Vul e-mailadres en wachtwoord in.';
    render();
    return;
  }
  authError = null;
  authBusy = true;
  render();
  signInWithEmailAndPassword(auth, email, pw).catch(err => {
    authBusy = false;
    authError = authErrorMessage(err.code);
    render();
  });
  // bij succes doet onAuthStateChanged de rest (screen wisselt, listeners starten)
}

// Kind-login: gebruikersnaam + pincode → het synthetische kind-e-mailadres.
// Zelfde afhandeling als de ouder-login, maar met kindvriendelijke teksten.
function submitKidLogin(){

  const pinInp = document.getElementById('authKidPin');

  const pin = pinInp ? pinInp.value.trim() : '';
