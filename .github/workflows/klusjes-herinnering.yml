name: Klusjes-herinnering

# Draait ~elke 15 min (UTC), bewust op ONEVEN minuten (:08 :23 :38 :53) i.p.v. op :00/:30.
# GitHub's schedule is best-effort en vertraagt/dropt runs het meest rond het begin van het
# uur (:00); off-hour + vaker vergroot de kans dat er 's avonds toch een run valt. Het script
# (scripts/notify.js) bepaalt per gezin of het NU moet sturen: enkel wanneer de Brusselse tijd
# het ingestelde uur (settings/notifyTime, default 19:00) heeft bereikt én er die dag nog niet
# gestuurd is. Zo hoeft de vaste cron de per-gezin-tijd niet te kennen, en vangt "vanaf-tijd,
# één keer per dag" late/gemiste runs vanzelf op. workflow_dispatch laat je hem handmatig testen.
on:
  schedule:
    - cron: '8,23,38,53 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Nu sturen, ongeacht het uur (test). Respecteert wel "uit" en stuurt enkel naar kinderen met openstaande klusjes + een token.'
        type: boolean
        default: false

# Voorkom dat overlappende runs tegelijk sturen.
concurrency:
  group: klusjes-herinnering
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node opzetten
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Dependencies installeren
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Herinneringen sturen
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FORCE: ${{ inputs.force }}
        run: node notify.js
